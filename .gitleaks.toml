title = "OctoBox Gitleaks Baseline"

[extend]
useDefault = true

[allowlist]
description = "Test fixture directories and CI-only placeholder credentials."
paths = [
  '''(^|[\\/])tests[\\/].*$''',
  '''(^|[\\/])boxcore[\\/]tests[\\/].*$''',
  '''(^|[\\/])student_identity[\\/]tests\.py$''',
  # E2E nightly workflow uses hardcoded dummy values for CI-only environment
  '''(^|[\\/])\.github[\\/]workflows[\\/]e2e-nightly\.yml$''',
  # E2E guide documents test fixture credentials inline (not real secrets)
  '''(^|[\\/])docs[\\/]testing[\\/]e2e-guide\.md$''',
]
