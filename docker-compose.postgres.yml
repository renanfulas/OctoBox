version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: octobox_postgres_local
    environment:
      POSTGRES_DB: octobox_control
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d octobox_control"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: octobox_redis_local
    ports:
      - "6380:6379"

volumes:
  postgres_data_local:
