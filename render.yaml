services:
  - type: web
    name: octobox-control
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi --log-file -
    preDeployCommand: python manage.py migrate && python manage.py bootstrap_roles
    healthCheckPath: /api/v1/health/
    autoDeploy: true
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: octobox-control-db
          property: connectionString
      - key: DB_SSL_REQUIRE
        value: "True"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DJANGO_ADMIN_URL_PATH
        sync: false
      - key: REDIS_URL
        fromService:
          name: octobox-control-cache
          type: keyvalue
          property: connectionString
      - key: LOGIN_RATE_LIMIT_MAX_REQUESTS
        value: "8"
      - key: LOGIN_RATE_LIMIT_WINDOW_SECONDS
        value: "300"
      - key: ADMIN_RATE_LIMIT_MAX_REQUESTS
        value: "12"
      - key: ADMIN_RATE_LIMIT_WINDOW_SECONDS
        value: "300"
      - key: WRITE_RATE_LIMIT_MAX_REQUESTS
        value: "30"
      - key: WRITE_RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: EXPORT_RATE_LIMIT_MAX_REQUESTS
        value: "6"
      - key: EXPORT_RATE_LIMIT_WINDOW_SECONDS
        value: "300"
      - key: HEAVY_READ_RATE_LIMIT_MAX_REQUESTS
        value: "30"
      - key: HEAVY_READ_RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: DASHBOARD_RATE_LIMIT_MAX_REQUESTS
        value: "30"
      - key: DASHBOARD_RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: AUTOCOMPLETE_RATE_LIMIT_MAX_REQUESTS
        value: "60"
      - key: AUTOCOMPLETE_RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: SECURITY_TRUSTED_PROXY_IPS
        sync: false
      - key: SECURITY_BLOCKED_IPS
        sync: false
      - key: SECURITY_BLOCKED_IP_RANGES
        sync: false
      - key: SECURITY_LOG_LEVEL
        value: WARNING
  - type: keyvalue
    name: octobox-control-cache
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: octobox-control-db
    plan: starter