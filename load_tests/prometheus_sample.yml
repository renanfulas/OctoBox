global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'octobox'
    static_configs:
      - targets: ['127.0.0.1:9100']

  - job_name: 'app'
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8000']
    relabel_configs:
      - source_labels: [__address__]
        regex: (.*):8000
        target_label: instance
        replacement: $1
