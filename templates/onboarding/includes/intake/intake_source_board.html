<!--
ARQUIVO: leitura de origem da Central de Intake.

POR QUE ELE EXISTE:
- isola a quebra por canal para facilitar manutencao da leitura curta.
-->
<article class="card glass-panel" id="intake-source-board" data-panel="intake-source-board">
    <div class="card-head">
        <div class="card-head-main">
            <h2 class="card-title">Raio-X de Canais e Origens</h2>
            <p class="card-copy">Analise de quais lugares (Insta, Portal, Balcão) sua demanda está vindo para isolar gargalos de captura.</p>
        </div>
    </div>
    <div class="intake-source-grid">
        {% for item in page.data.source_breakdown %}
        <article class="intake-mini-card" data-panel="intake-source-card">
            <div class="card-body intake-mini-card-body">
                <div class="card-value-stack intake-mini-card-value-stack">
                    <strong>{{ item.label }}</strong>
                    <p class="metric">{{ item.value }}</p>
                </div>
                <div class="card-content intake-mini-card-content">
                    <p class="meta-text-sm">{{ item.note }}</p>
                </div>
            </div>
        </article>
        {% endfor %}
    </div>
</article>
