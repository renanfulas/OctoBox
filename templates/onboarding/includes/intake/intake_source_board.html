<!--
ARQUIVO: leitura de origem da Central de Intake.

POR QUE ELE EXISTE:
- Isola a quebra por canal para facilitar manutencao da leitura curta.

O QUE ESTE ARQUIVO FAZ:
1. Exibe cards de origem dos contatos.
2. Mostra label e volume por canal.

PONTOS CRITICOS:
- Depende do contexto de source_breakdown.
-->
<article class="card intake-source-board-card" id="intake-source-board" data-panel="intake-source-board">
    <div class="card-head">
        <div class="card-head-main intake-source-board-head-copy">
            <p class="intake-source-board-eyebrow eyebrow">Radar comercial</p>
            <h2 class="card-title intake-source-board-title">Canais de entrada</h2>
            <p class="card-copy intake-source-board-copy">Compare os canais em uma leitura curta, limpa e direta.</p>
        </div>
    </div>
    <div class="intake-source-grid">
        {% for item in page.data.source_breakdown %}
        <article class="intake-source-card" data-panel="intake-source-card" data-source-key="{{ item.key }}">
            <div class="card-body intake-source-card-body">
                <div class="card-value-stack intake-source-card-value-stack">
                    <strong class="intake-source-card-label">{{ item.label }}</strong>
                    <p class="metric intake-source-card-metric">{{ item.value }}</p>
                </div>
            </div>
        </article>
        {% endfor %}
    </div>
</article>
