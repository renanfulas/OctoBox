<!--
ARQUIVO: leitura de origem da Central de Intake.

POR QUE ELE EXISTE:
- Isola a quebra por canal para facilitar manutenção da leitura curta.

O QUE ESTE ARQUIVO FAZ:
1. Exibe cards de origem dos contatos.
2. Mostra label, valor e nota para cada canal.

PONTOS CRITICOS:
- Depende do contexto de source_breakdown.
-->
<article class="card glass-panel" id="intake-source-board" data-panel="intake-source-board">
    <div class="card-head">
        <div class="card-head-main">
            <h2 class="card-title">De onde vêm os Contatos</h2>
            <p class="card-copy">Veja quantos novos contatos chegam pelo Instagram, Site ou Balcão para saber de onde vem seu público.</p>
        </div>
    </div>
    <div class="intake-source-grid">
        {% for item in page.data.source_breakdown %}
        <article class="intake-mini-card" data-panel="intake-source-card">
            <div class="card-body intake-mini-card-body">
                <div class="card-value-stack intake-mini-card-value-stack">
                    <strong>{{ item.label }}</strong>
                    <p class="metric">{{ item.value }}</p>
                </div>
                <div class="card-content intake-mini-card-content">
                    <p class="meta-text-sm">{{ item.note }}</p>
                </div>
            </div>
        </article>
        {% endfor %}
    </div>
</article>
