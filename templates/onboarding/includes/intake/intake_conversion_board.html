<!--
ARQUIVO: regras de conversão da Central de Intake.

POR QUE ELE EXISTE:
- Explica a fronteira entre intake e aluno, orientando o processo de conversão.

O QUE ESTE ARQUIVO FAZ:
1. Lista regras e etapas para transformar contato em aluno.
2. Exibe cards para cada regra de conversão.

PONTOS CRITICOS:
- Depende do contexto de conversion_rules.
-->
<article class="card glass-panel" id="intake-conversion-board" data-panel="intake-conversion-board">
    <div class="card-head">
        <div class="card-head-main">
            <h2 class="card-title">Como um Contato vira Aluno</h2>
            <p class="card-copy">Entenda o passo a passo para atender quem chega e transformá-lo em um aluno oficial.</p>
        </div>
    </div>
    <div class="stack-14">
        {% for item in page.data.conversion_rules %}
        <article class="intake-rule-card" data-panel="intake-rule-card">
            <div class="card-body intake-rule-card-body">
                <div class="card-value-stack intake-rule-card-value-stack">
                    <strong>{{ item.title }}</strong>
                </div>
                <div class="card-content intake-rule-card-content">
                    <p class="meta-text">{{ item.copy }}</p>
                </div>
            </div>
        </article>
        {% endfor %}
    </div>
</article>
