<!--
ARQUIVO: regras de conversao da Central de Intake.

POR QUE ELE EXISTE:
- preserva a explicacao semantica da fronteira entre intake e aluno.
-->
<article class="card glass-panel" id="intake-conversion-board" data-panel="intake-conversion-board">
    <div class="card-head">
        <div class="card-head-main">
            <h2 class="card-title">Regras de Conversão e Evolução</h2>
            <p class="card-copy">Entenda de forma clara quando um contato abandona a provisória e vira aluno definitivo na base.</p>
        </div>
    </div>
    <div class="stack-14">
        {% for item in page.data.conversion_rules %}
        <article class="intake-rule-card" data-panel="intake-rule-card">
            <div class="card-body intake-rule-card-body">
                <div class="card-value-stack intake-rule-card-value-stack">
                    <strong>{{ item.title }}</strong>
                </div>
                <div class="card-content intake-rule-card-content">
                    <p class="meta-text">{{ item.copy }}</p>
                </div>
            </div>
        </article>
        {% endfor %}
    </div>
</article>
