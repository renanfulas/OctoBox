{% if card.href %}<a href="{{ card.href }}" class="metric-card-link">{% endif %}
<article class="card metric-card kpi-family-card intake-kpi-card intake-interactive-kpi {{ card.card_class }} {{ card.tone_class }} {{ card_extra_classes }}{% if card.data_action %} has-action cursor-pointer{% endif %}{% if card.href %} has-href{% endif %}" data-panel="metric-card" data-slot="intake-interactive-kpi-card"{% if card.data_action %} data-action="{{ card.data_action }}"{% endif %}>
    <div class="card-body card-body-metric intake-kpi-card-body">
        {% if card.icon %}
        <div class="icon-box intake-kpi-icon-box kpi-card-icon-box" aria-hidden="true">
            {{ card.icon|safe }}
        </div>
        {% endif %}
        <div class="card-value-stack">
            <div class="intake-kpi-card-head">
                <p class="eyebrow card-label intake-kpi-card-label">
                    {% if card.eyebrow %}{{ card.eyebrow }}{% else %}{{ card.label }}{% endif %}
                </p>
            </div>
            <div class="card-value-row{% if card.is_jumbo %} is-jumbo{% endif %}">
                <p class="metric card-value">
                    <span class="metric-number intake-kpi-card-value{% if card.value_class %} {{ card.value_class }}{% endif %}">{{ card.display_value }}</span>
                </p>
            </div>
        </div>
    </div>
</article>
{% if card.href %}</a>{% endif %}
