<!--
ARQUIVO: filtros da Central de Intake.

POR QUE ELE EXISTE:
- isola o recorte da fila para manter o template principal curto.

O QUE ESTE ARQUIVO FAZ:
1. Exibe formulario de filtros e busca.
2. Permite filtrar leads por status, origem, estagio e responsavel.

PONTOS CRITICOS:
- Depende do contexto de filter_form.
-->
<section class="card glass-panel intake-filter-card intake-filter-card--engine" aria-label="Busca e filtros da central de intake" data-slot="filters" data-panel="intake-filters">
    {% url 'intake-center' as intake_center_url %}
    <div class="card-head">
        <div class="card-head-main">
            <h2 class="card-title">Motor de Busca e Foco</h2>
            <p class="card-copy">Filtre seus leads, veja apenas o de urg&ecirc;ncia ou separe por qual recepcionista est&aacute; lidando com qual pessoa.</p>
        </div>
    </div>
    <form method="get" class="form-stack" data-action="filter-intakes">
        <div class="field-grid-200">
            <label>
                <span class="field-label">{{ page.data.filter_form.query.label }}</span>
                {{ page.data.filter_form.query }}
            </label>
            <label>
                <span class="field-label">{{ page.data.filter_form.status.label }}</span>
                {{ page.data.filter_form.status }}
            </label>
            <label>
                <span class="field-label">{{ page.data.filter_form.source.label }}</span>
                {{ page.data.filter_form.source }}
            </label>
            <label>
                <span class="field-label">{{ page.data.filter_form.semantic_stage.label }}</span>
                {{ page.data.filter_form.semantic_stage }}
            </label>
            <label>
                <span class="field-label">{{ page.data.filter_form.assignment.label }}</span>
                {{ page.data.filter_form.assignment }}
            </label>
        </div>
        <div class="actions actions-tight">
            <button class="button" type="submit" data-action="apply-intake-filters">Aplicar filtros</button>
            <a class="button secondary" href="{{ intake_center_url }}" data-action="clear-intake-filters">Limpar</a>
        </div>
    </form>
</section>
