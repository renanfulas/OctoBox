<!--
ARQUIVO: metricas da Central de Intake.

POR QUE ELE EXISTE:
- separa o pulso numerico da fila do restante da tela.
-->
<section class="layout-block layout-block--rail panel-grid" aria-label="Metricas da central de intake" data-slot="metrics" data-panel="intake-metrics">
    {% for label, item in page.data.metrics.items %}
    <article class="card metric-card primary-glow">
        <div class="card-body card-body-metric intake-metric-body">
            <div class="card-value-stack">
                <p class="eyebrow card-label">{{ label }}</p>
                <p class="metric card-value">{{ item.value }}</p>
            </div>
            <div class="card-content">
                <p class="metric-note card-copy">{{ item.note }}</p>
            </div>
        </div>
        <div class="card-footer intake-metric-footer">
            <div class="metric-pulse"></div>
        </div>
    </article>
    {% endfor %}
</section>
