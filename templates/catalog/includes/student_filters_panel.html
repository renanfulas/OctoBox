<!--
ARQUIVO: filtros da pagina de alunos.

POR QUE ELE EXISTE:
- isola busca, recorte e utilitarios em um bloco facil de manter.
-->
<section id="tab-students-filters" class="card glass-panel student-filter-card" aria-label="Busca e filtros" data-slot="filters" data-panel="students-filters" style="padding: 55px 32px;">
    <div class="card-head-stacked" style="display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 13px;">
        <h3 class="card-title">Filtre a base</h3>
        <p class="meta-text-sm" style="color: var(--muted); margin-top: 4px;">Busca e recortes comerciais para estreitar a leitura.</p>
    </div>
    <form method="get" class="form-stack" data-action="filter-students">
        <div class="field-grid-200">
            <label>
                <span class="field-label">{{ page.data.student_filter_form.query.label }}</span>
                {{ page.data.student_filter_form.query }}
            </label>
            <label>
                <span class="field-label">{{ page.data.student_filter_form.student_status.label }}</span>
                {{ page.data.student_filter_form.student_status }}
            </label>
            <label>
                <span class="field-label">{{ page.data.student_filter_form.commercial_status.label }}</span>
                {{ page.data.student_filter_form.commercial_status }}
            </label>
            <label>
                <span class="field-label">{{ page.data.student_filter_form.payment_status.label }}</span>
                {{ page.data.student_filter_form.payment_status }}
            </label>
        </div>
        <div class="actions actions-tight student-filter-actions-primary">
            <button class="button button-pill" type="submit" data-action="apply-student-filters">Aplicar filtros</button>
            <a href="{% url 'student-directory' %}?keep_open=true" class="button button-outline button-pill" style="color: var(--slate-700); border-color: var(--line);">Limpar filtros</a>
        </div>
    </form>
</section>
