<!--
ARQUIVO: bloco consolidado de abas/kpis da pagina de alunos.

POR QUE ELE EXISTE:
- Renderiza 4 KPI cards que funcionam como os triggers das abas de operação (busca, prioridades, intake, diretório geral).
-->
<div class="owner-metrics-panel section-gap">
    <section class="panel-grid operation-metric-grid owner-metric-grid interactive-tab-triggers"
        aria-label="Navegacao principal de alunos">
        {% for card in page.data.interactive_kpis %}
        {% include "includes/ui/shared/metric_card.html" with card=card compact=True extra_classes="dashboard-kpi-card kpi-slate is-ledger "|add:card.tone_class %}
        {% endfor %}
    </section>
</div>
