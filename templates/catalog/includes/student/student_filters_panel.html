<!--
ARQUIVO: filtros da pagina de alunos.

POR QUE ELE EXISTE:
- isola busca e filtros rapidos em uma barra unica.
-->
<section id="student-filter-bar" class="student-filter-bar" aria-label="Busca e filtros do diretorio">
    <form method="get" action="." class="student-filter-form" id="student-directory-filter-form">
        {% if request.GET.student_status %}
            <input type="hidden" name="student_status" value="{{ request.GET.student_status }}">
        {% endif %}
        {% if request.GET.payment_status %}
            <input type="hidden" name="payment_status" value="{{ request.GET.payment_status }}">
        {% endif %}

        <label class="student-filter-search" aria-label="Buscar aluno">
            <span class="student-filter-search-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input
                type="text"
                name="query"
                value="{{ page.data.student_filter_form.query.value|default:'' }}"
                placeholder="Buscar aluno, e-mail ou telefone..."
                class="student-filter-search-input"
            >
        </label>
    </form>

    <nav class="student-filter-pills" aria-label="Filtros rapidos do diretorio">
        <a href="?{% if page.data.student_filter_form.query.value %}query={{ page.data.student_filter_form.query.value|urlencode }}{% endif %}" class="student-filter-pill {% if not request.GET.student_status and not request.GET.payment_status %}is-active{% endif %}">Todos</a>
        <a href="?{% if page.data.student_filter_form.query.value %}query={{ page.data.student_filter_form.query.value|urlencode }}&{% endif %}student_status=active" class="student-filter-pill {% if request.GET.student_status == 'active' %}is-active{% endif %}">Ativos</a>
        <a href="?{% if page.data.student_filter_form.query.value %}query={{ page.data.student_filter_form.query.value|urlencode }}&{% endif %}payment_status=overdue" class="student-filter-pill {% if request.GET.payment_status == 'overdue' %}is-active{% endif %}">Inadimplentes</a>
        <a href="?{% if page.data.student_filter_form.query.value %}query={{ page.data.student_filter_form.query.value|urlencode }}&{% endif %}student_status=inactive" class="student-filter-pill {% if request.GET.student_status == 'inactive' %}is-active{% endif %}">Inativos</a>
    </nav>

    <p class="student-filter-count">{{ page.data.total_students }} alunos</p>
</section>
