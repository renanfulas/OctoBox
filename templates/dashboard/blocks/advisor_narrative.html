<section class="dashboard-hero dashboard-advisor-narrative" aria-label="Motor narrativo do gestor">
    <div class="dashboard-advisor-narrative-watermark" aria-hidden="true"></div>

    <div class="dashboard-advisor-narrative-copy">
        <p class="eyebrow dashboard-advisor-narrative-eyebrow">
            Leitura do dia
        </p>
        <h1 class="dashboard-advisor-narrative-title">
            Bom te ver, {{ user.first_name|default:"Maestro" }}.
        </h1>
        <p class="dashboard-advisor-narrative-body">
            A retencao pede cuidado hoje. A receita caiu um pouco no ritmo da semana, mas ha cinco renovacoes com boa chance de conversa. Vale comecar por elas, sem pressa e sem ruido.
        </p>
    </div>

    <div class="dashboard-advisor-narrative-actions">
        <button type="button" class="button dashboard-advisor-manifesto-trigger" id="trigger-manifesto-modal">
            Ler com calma
        </button>

        <span class="dashboard-advisor-metric-pill">
            <span class="dashboard-advisor-metric-trend dashboard-advisor-metric-trend--up">&uarr; 4%</span> Retencao em alta
        </span>

        <span class="dashboard-advisor-metric-pill">
            <span class="dashboard-advisor-metric-trend dashboard-advisor-metric-trend--down">&darr; 2%</span> Receita abaixo do ritmo
        </span>
    </div>
</section>
