<article class="table-card dashboard-focus-card dashboard-focus-card--brand">
    <div class="fdw-focus-card-head dashboard-advisor-card-head">
        <span class="fdw-focus-index dashboard-advisor-index">Meta</span>
        <div class="fdw-focus-meta">
            <span class="fdw-focus-chip is-warning dashboard-advisor-chip dashboard-advisor-chip--success">Sprint Semanal</span>
        </div>
    </div>
    <div class="fdw-focus-body">
        
        <h3 class="dashboard-advisor-heading dashboard-advisor-heading--sm">Missao: Fechar a torneira</h3>
        <p class="dashboard-advisor-subheading dashboard-advisor-subheading--spaced">
            Renovar 5 alunos atritados desta semana para garantir o alvo da receita.
        </p>

        <div class="dashboard-advisor-progress">
            <div class="dashboard-advisor-progress-head">
                <span>Progresso</span>
                <span class="dashboard-advisor-progress-value">3 / 5 (60%)</span>
            </div>
            <div class="dashboard-advisor-progress-track">
                <div class="dashboard-advisor-progress-fill dashboard-advisor-progress-fill--60"></div>
            </div>
        </div>

        <button class="button dashboard-advisor-cta dashboard-advisor-cta--full" type="button">Ver Alvos Restantes</button>

    </div>
</article>
