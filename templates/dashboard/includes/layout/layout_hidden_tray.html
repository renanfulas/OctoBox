<!--
ARQUIVO: layout_hidden_tray.html
POR QUE ELE EXISTE:
- Exibe a área de blocos ocultos do dashboard.
O QUE ESTE ARQUIVO FAZ:
- Renderiza lista de blocos ocultos e botões para restaurar.
PONTOS CRITICOS:
- Depende de page.data.dashboard_layout.hidden_blocks.
-->
<div class="dashboard-layout-hidden-tray{% if not page.data.dashboard_layout.hidden_blocks %} is-empty{% endif %}" data-dashboard-hidden-tray>
    <p class="dashboard-layout-hidden-title">Blocos ocultos</p>
    <div class="dashboard-layout-hidden-list" data-dashboard-hidden-list>
        {% for block in page.data.dashboard_layout.hidden_blocks %}
        <button class="button secondary dashboard-layout-hidden-chip" type="button" data-restore-block="{{ block.id }}">Restaurar {{ block.label }}</button>
        {% empty %}
        <p class="dashboard-layout-hidden-empty" data-dashboard-hidden-empty>Nenhum bloco oculto.</p>
        {% endfor %}
    </div>
</div>
