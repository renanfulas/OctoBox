<!--
ARQUIVO: layout_toolbar.html
POR QUE ELE EXISTE:
- Exibe a barra de ferramentas de organizacao do dashboard.
O QUE ESTE ARQUIVO FAZ:
- Renderiza botoes para organizar e restaurar o layout, alem de incluir a area de blocos ocultos.
PONTOS CRITICOS:
- Depende de page.data.dashboard_layout.hidden_blocks.
-->
<div class="dashboard-layout-toolbar{% if page.data.dashboard_layout.hidden_blocks %} has-hidden-blocks{% endif %}" data-dashboard-layout-toolbar aria-label="Organizacao do dashboard">
    <div class="actions actions-tight">
        <button class="button ghost" type="button" id="toggle-dashboard-layout" aria-pressed="false">Organizar painel</button>
        <button class="button ghost" type="button" id="reset-dashboard-layout" hidden>Restaurar padrao</button>
    </div>
    <p class="dashboard-layout-status visually-hidden" id="dashboard-layout-status" aria-live="polite"></p>
    {% include "dashboard/includes/layout/layout_hidden_tray.html" with page=page %}
</div>
