<tr>
    <td data-label="Nome">{{ contact.display_name|default:"Sem nome" }}</td>
    <td data-label="Telefone">{{ contact.phone }}</td>
    <td data-label="Status"><span class="pill info">{{ contact.status_label }}</span></td>
    <td data-label="Proxima acao">
        <div class="manager-row-decision">
            {% with action=contact.decision_action %}
            <a
                class="button secondary button-sm manager-row-cta manager-row-cta--{{ action.tone|default:'structural' }}"
                href="{{ action.href|default:'#manager-link-board' }}"
                aria-label="{{ action.aria_label|default:'Abrir diretorio de alunos' }}"
            >
                {{ action.label|default:'Revisar vinculo' }}
            </a>
            <p class="manager-row-decision-note">{{ action.note|default:'Descubra se este contato ja pode sair do limbo operacional.' }}</p>
            {% endwith %}
        </div>
    </td>
</tr>
