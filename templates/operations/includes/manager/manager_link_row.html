<tr>
    <td>{{ contact.display_name|default:"Sem nome" }}</td>

    <td>{% if contact.display_name %}<span class="pill accent">Vincular aluno</span>{% else %}<span class="pill warning">Identificar contato</span>{% endif %}</td>
</tr>
