<tr>
    {% url 'student-quick-create' as student_quick_create_url %}
    <td>
        <strong>{{ intake.full_name }}</strong>
        <p class="meta-text-sm">{{ intake.phone }}{% if intake.email %} | {{ intake.email }}{% endif %}</p>
    </td>
    <td>{{ intake.get_source_display }}</td>
    <td><span class="pill info">{{ intake.get_status_display }}</span></td>
    <td>
        <a class="button secondary button-sm" href="{{ student_quick_create_url }}?intake={{ intake.id }}#student-form-essential">Abrir cadastro</a>
    </td>
</tr>
