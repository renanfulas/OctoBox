<tr>
    <td data-label="Contato">
        <strong>{{ intake.full_name }}</strong>
        <p class="meta-text-sm">{{ intake.phone }}{% if intake.email %} | {{ intake.email }}{% endif %}</p>
    </td>
    <td data-label="Origem">{{ intake.source_label }}</td>
    <td data-label="Fila"><span class="pill info">{% if intake.status_label %}{{ intake.status_label }}{% else %}Novo agora{% endif %}</span></td>
    <td data-label="Acao">
        <a class="button secondary button-sm" href="{{ intake.student_quick_create_href }}">Cadastrar aluno</a>
    </td>
</tr>
