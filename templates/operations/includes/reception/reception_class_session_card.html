{% url 'class-grid' as class_grid_url %}
<article class="reception-grade-card reception-class-session-card" data-panel="reception-class-session-card">
    <div class="reception-class-session-copy">
        <p class="eyebrow">Aula visivel</p>
        <h3 class="operation-card-title">{{ session.title }}</h3>
        <p class="meta-text-sm reception-class-session-time">{{ session.scheduled_at|date:"d/m/Y H:i" }}</p>
        {% if session.notes %}<p class="meta-text reception-class-session-notes">{{ session.notes }}</p>{% endif %}
    </div>
    <div class="reception-grade-stats">
        <div class="finance-alert-stat">
            <span class="operation-mini-label">Presencas</span>
            <strong>{{ session.attendance_count }}</strong>
        </div>
        <div class="finance-alert-stat">
            <span class="operation-mini-label">Uso no balcao</span>
            <strong>Orientacao rapida</strong>
        </div>
    </div>
    <div class="actions actions-tight reception-class-session-actions">
        <a class="button secondary button-sm" href="{{ class_grid_url }}">Abrir grade completa</a>
    </div>
</article>
