<article class="dashboard-session-card dashboard-session-card--compact">
    <div class="dashboard-session-time-block">
        <div class="dashboard-session-time">{{ session.scheduled_at|date:"H:i" }}</div>
        <p class="dashboard-session-window">no balcão</p>
    </div>
    <div class="dashboard-session-body">
        <p class="dashboard-session-kicker">AULA FUTURA</p>
        <strong>{{ session.title }}</strong>
        <p class="text-muted text-truncate" style="font-size: 0.75rem; margin-top: 2px;" title="{{ session.notes }}">
            {% if session.notes %}{{ session.notes|truncatechars:35 }}{% else %}Sem nota extra{% endif %}
        </p>
    </div>
    <div class="dashboard-session-meta">
        <span class="pill outline">Previsão</span>
        <span class="pill ghost">{{ session.attendances.all|length }} conf</span>
    </div>
</article>
