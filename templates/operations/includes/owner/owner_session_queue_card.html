<!--
ARQUIVO: owner_session_queue_card.html

POR QUE ELE EXISTE:
- renderiza os cards compactos da fila da agenda do owner com contrato local de naming.

PONTOS CRITICOS:
- depende do objeto 'session' no mesmo shape da agenda operacional do owner.
-->
<article class="owner-session-card owner-session-card--compact">
    <div class="owner-session-time-block">
        <div class="owner-session-time">{{ session.starts_at|date:"H:i" }}</div>
        <p class="owner-session-window">ate {{ session.ends_at|date:"H:i" }}</p>
    </div>
    <div class="owner-session-body">
        <p class="owner-session-kicker">{{ session.dashboard_kicker }}</p>
        <strong>{{ session.object.title }}</strong>
        <p>{{ session.coach_name }}</p>
    </div>
    <div class="owner-session-meta">
        <span class="pill{% if session.status_pill_class %} {{ session.status_pill_class }}{% endif %}">{{ session.status_label }}</span>
        <span class="pill{% if session.occupancy_pill_class %} {{ session.occupancy_pill_class }}{% endif %}">{{ session.occupied_slots }}/{{ session.capacity }}</span>
    </div>
</article>
