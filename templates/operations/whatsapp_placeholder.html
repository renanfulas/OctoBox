{% extends "layouts/base.html" %}
{% load static %}

{% block content %}
<div class="workspace-container">
    <div class="dashboard-hero" style="margin-top: 40px; text-align: center;">
        <div class="hero-operation" style="
            background: var(--surface); 
            border: 1px solid var(--line); 
            padding: 60px 40px; 
            border-radius: 24px; 
            display: inline-block; 
            max-width: 600px;
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow-lift);
        ">
            <div class="whatsapp-glow" style="
                width: 80px; 
                height: 80px; 
                background: rgba(37, 211, 102, 0.1); 
                border-radius: 50%; 
                display: flex; 
                align-items: center; 
                justify-content: center; 
                margin: 0 auto 24px;
                box-shadow: 0 0 30px rgba(37, 211, 102, 0.2);
                border: 1px solid rgba(37, 211, 102, 0.2);
            ">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" width="40" height="40" style="fill: #25D366;">
                    <path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-5.5-2.8-23.2-8.5-44.2-27.1-16.4-14.6-27.4-32.7-30.6-38.2-3.2-5.6-.3-8.6 2.4-11.4 2.5-2.5 5.5-6.5 8.3-9.8 2.8-3.3 3.7-5.6 5.5-9.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 13.2 5.8 23.5 9.2 31.5 11.8 13.3 4.2 25.4 3.6 35 2.2 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.7z"/>
                </svg>
            </div>
            <h1 style="font-size: 2.5rem; font-weight: 800; color: var(--ink); margin-bottom: 16px; letter-spacing: -1px;">Em construção</h1>
            <p style="font-size: 1.125rem; color: var(--muted); line-height: 1.6;">Estamos preparando a central de mensagens do seu box. Em breve, você poderá gerenciar todo o relacionamento com seus alunos diretamente por aqui.</p>
            
            <div style="margin-top: 40px;">
                <a href="{% url 'dashboard' %}" class="btn-back" style="
                    display: inline-block;
                    padding: 12px 24px;
                    background: var(--bg-depth);
                    border: 1px solid var(--line);
                    color: var(--ink);
                    text-decoration: none;
                    border-radius: 12px;
                    font-weight: 600;
                    transition: all 0.2s;
                ">Voltar ao Dashboard</a>
            </div>
        </div>
    </div>
</div>

<style>
    .workspace-container {
        padding: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
    }
    .btn-back:hover {
        background: rgba(255, 255, 255, 0.1) !important;
    }
</style>
{% endblock %}
