<section class="student-card student-card--feature">
    <div class="student-section-head">
        <div>
            <span class="student-context-switch">Records</span>
            <h2>Movimentos</h2>
        </div>
    </div>
    <div class="student-rm-list">
        {% for card in rm_cards %}
        <article class="student-rm-card">
            <div>
                <strong>{{ card.record.exercise_label }}</strong>
                <p class="student-copy">{{ card.record.updated_at|date:"d/m" }}{% if card.delta_kg %} &middot; +{{ card.delta_kg }} kg{% endif %}</p>
            </div>
            <form method="post" action="{% url 'student-app-rm-update' card.record.id %}" class="student-rm-inline-form">
                {% csrf_token %}
                <input class="student-input" type="number" name="one_rep_max_kg" min="0.5" max="999" step="0.01" value="{{ card.record.one_rep_max_kg }}">
                <button type="submit" class="student-secondary-action">Atualizar</button>
            </form>
        </article>
        {% empty %}
        <article class="student-compact-state">
            <strong>Nenhum RM ainda.</strong>
            <p class="student-copy">Registre o primeiro.</p>
        </article>
        {% endfor %}
    </div>
</section>
