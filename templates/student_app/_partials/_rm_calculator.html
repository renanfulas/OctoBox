<section class="student-card student-card--feature student-rm-calculator" data-ui="student-rm-calculator" aria-label="Calculadora de RM">
    <div class="student-section-head">
        <div>
            <span class="student-context-switch">Calculadora</span>
        </div>
    </div>
    <div class="student-rm-calculator__grid">
        <label>
            <span>RM base</span>
            <span class="student-field-with-unit">
                <input class="student-input" type="number" min="0" max="999" step="0.5" value="{% if rm_records %}{{ rm_records.0.one_rep_max_kg }}{% else %}0{% endif %}" inputmode="decimal" data-max-integer-digits="3" data-ui="student-rm-base">
                <span class="student-field-with-unit__suffix">kg</span>
            </span>
        </label>
        <label>
            <span>Percentual</span>
            <span class="student-field-with-unit student-field-with-unit--prefix">
                <span class="student-field-with-unit__prefix">%</span>
                <input class="student-input" type="number" min="40" max="100" step="5" value="70" inputmode="numeric" data-ui="student-rm-percent">
            </span>
        </label>
        <output class="student-rm-calculator__result" data-ui="student-rm-result">-- kg</output>
    </div>
    <p class="student-copy" data-ui="student-rm-feedback" hidden>Escolha um RM e um percentual validos para calcular.</p>
</section>
