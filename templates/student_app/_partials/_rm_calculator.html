<section class="student-card student-card--feature student-rm-calculator" data-ui="student-rm-calculator">
    <div class="student-section-head">
        <div>
            <span class="student-context-switch">Calculadora</span>
            <h2>Calcular carga</h2>
        </div>
    </div>
    <div class="student-rm-calculator__grid">
        <label>
            <span>RM base</span>
            <span class="student-field-with-unit">
                <input class="student-input" type="number" min="0.5" step="0.5" value="{% if rm_records %}{{ rm_records.0.one_rep_max_kg }}{% endif %}" data-ui="student-rm-base">
                <span class="student-field-with-unit__suffix">kg</span>
            </span>
        </label>
        <label>
            <span>Percentual</span>
            <select class="student-input" data-ui="student-rm-percent">
                {% for value in percentage_choices %}
                <option value="{{ value }}"{% if value == 70 %} selected{% endif %}>{{ value }}%</option>
                {% endfor %}
            </select>
        </label>
        <output class="student-rm-calculator__result" data-ui="student-rm-result">-- kg</output>
    </div>
    <p class="student-copy" data-ui="student-rm-feedback" hidden>Escolha um RM e um percentual validos para calcular.</p>
</section>
