<div class="student-session-actions" aria-label="Acoes da aula {{ session.title }}">
    {% if session.can_book %}
    <form method="post" action="{% url 'student-app-confirm-attendance' %}" class="student-inline-form">
        {% csrf_token %}
        <input type="hidden" name="session_id" value="{{ session.session_id }}">
        <input type="hidden" name="next" value="{{ request.get_full_path }}">
        <button type="submit" class="student-secondary-action" aria-label="Reservar {{ session.title }} em {{ session.scheduled_label }}">
            Reservar
        </button>
    </form>
    {% elif session.is_plan_blocked %}
    <button
        type="button"
        class="student-secondary-action student-session-action--blocked"
        disabled
        aria-disabled="true"
        title="{{ session.plan_block_reason }}"
    >
        Renove seu plano
    </button>
    {% elif session.is_day_blocked %}
    <button
        type="button"
        class="student-secondary-action student-session-action--blocked"
        disabled
        aria-disabled="true"
        title="{{ session.day_block_reason }}"
    >
        {% if session.day_block_reason == 'Presenca confirmada' %}Presenca confirmada{% else %}Dia ocupado{% endif %}
    </button>
    {% elif session.attendance_code == 'checked_in' %}
    <button type="button" class="student-secondary-action student-session-action--blocked" disabled aria-disabled="true">
        Presenca confirmada
    </button>
    {% endif %}
    {% if session.can_cancel_attendance %}
    <form
        method="post"
        action="{% url 'student-app-cancel-attendance' %}"
        class="student-inline-form"
        onsubmit="return confirm('Cancelar sua reserva nesta aula?')"
    >
        {% csrf_token %}
        <input type="hidden" name="session_id" value="{{ session.session_id }}">
        <input type="hidden" name="next" value="{{ request.get_full_path }}">
        <button type="submit" class="student-secondary-action student-secondary-action--danger" aria-label="Cancelar reserva em {{ session.title }} em {{ session.scheduled_label }}">
            Cancelar
        </button>
    </form>
    {% endif %}
</div>
