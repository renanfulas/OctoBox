{% if student_can_switch_box %}
<details class="student-box-switcher">
    <summary>Trocar box</summary>
    <div class="student-box-switcher-panel">
        <p class="student-form-note">Troque o contexto ativo sem relogar. O box principal continua sendo {{ student_primary_box_root_slug }}.</p>
        <div class="student-box-switcher-list">
            {% for box_choice in student_box_choices %}
            <form method="post" action="{% url 'student-app-switch-box' %}">
                {% csrf_token %}
                <input type="hidden" name="box_root_slug" value="{{ box_choice.box_root_slug }}">
                <input type="hidden" name="next" value="{{ request.get_full_path }}">
                <button
                    type="submit"
                    class="student-box-switch-button{% if box_choice.is_active %} is-active{% endif %}"
                    {% if box_choice.is_active %}disabled{% endif %}
                >
                    <span>{{ box_choice.box_root_slug }}</span>
                    <span class="student-box-switch-meta">
                        {% if box_choice.is_primary %}<small>principal</small>{% endif %}
                        {% if box_choice.is_active %}<small>ativo</small>{% endif %}
                    </span>
                </button>
            </form>
            {% endfor %}
        </div>
    </div>
</details>
{% endif %}
