{% load static %}
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#f5f7fb">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="OctoBox">
<script>
    (function () {
        var storedTheme = '';
        try {
            storedTheme = window.localStorage.getItem('octobox-theme') || '';
        } catch (error) {
            storedTheme = '';
        }

        var theme = storedTheme === 'dark' || storedTheme === 'light'
            ? storedTheme
            : ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');

        window.__octoboxStudentTheme = theme;
        document.documentElement.style.colorScheme = theme;

        var themeMeta = document.querySelector('meta[name="theme-color"]');
        if (themeMeta) {
            themeMeta.setAttribute('content', theme === 'dark' ? '#091221' : '#f5f7fb');
        }
    }());
</script>
<link rel="manifest" href="{% url 'student-app-manifest' %}">
<link rel="apple-touch-icon" href="{% static 'images/student-app-apple-touch-icon.png' %}">
<link rel="icon" href="{% static 'images/student-app-icon.svg' %}" type="image/svg+xml">
<link rel="icon" href="{% static 'images/student-app-icon-192.png' %}" sizes="192x192" type="image/png">
<link rel="stylesheet" href="{% static 'css/student_app/app.css' %}">
