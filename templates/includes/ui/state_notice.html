<div class="state-notice state-notice-{{ tone|default:'info' }}{% if compact %} is-compact{% endif %}{% if class_name %} {{ class_name }}{% endif %}">
    <div class="state-notice-head">
        <div>
            {% if eyebrow %}<p class="eyebrow">{{ eyebrow }}</p>{% endif %}
            {% if title %}<h3 class="state-notice-title">{{ title }}</h3>{% endif %}
            {% if copy %}<p class="state-notice-copy">{{ copy }}</p>{% endif %}
        </div>
        {% if badge %}<span class="pill{% if badge_class %} {{ badge_class }}{% endif %}">{{ badge }}</span>{% endif %}
    </div>
    {% if hint %}<p class="state-notice-hint">{{ hint }}</p>{% endif %}
</div>
