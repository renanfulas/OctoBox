<!--
ARQUIVO: dashboard_glance_card.html
POR QUE ELE EXISTE:
- Exibe um card de resumo rápido de prioridade no dashboard.
O QUE ESTE ARQUIVO FAZ:
- Renderiza valores, indicadores e texto de contexto para alertas e prioridades.
PONTOS CRITICOS:
- Depende do objeto 'card' e do parâmetro 'kicker'.
-->
{% load dashboard_filters %}
{% with display_kicker=kicker|default:card.kicker %}
<a class="dashboard-glance-card dashboard-glance-card--summary {{ card.card_class }}{% if card.severity == 'emergency' %} is-emergency{% elif card.severity == 'warning' %} is-warning{% elif card.severity == 'risk' %} is-risk{% endif %}{% if card.is_actionable %} is-actionable{% else %} is-tranquil{% endif %}" href="{{ card.href }}">
    <span class="dashboard-glance-kicker">{{ display_kicker }}</span>
    <div class="dashboard-glance-value-row">
        <strong class="dashboard-glance-value">{{ card.value }}</strong>
        <span class="dashboard-glance-indicator {{ card.indicator_class }}">{{ card.indicator }}</span>
    </div>
    <p class="dashboard-glance-copy">{{ card.copy|smart_break }}</p>
</a>
{% endwith %}
