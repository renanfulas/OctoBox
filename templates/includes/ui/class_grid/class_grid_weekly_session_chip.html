<article class="weekly-session-chip{% if item.occupancy_pill_class %} is-{{ item.occupancy_pill_class }}{% endif %}{% if item.booking_closed %} is-booking-closed{% endif %}" data-panel="class-grid-weekly-session-chip">
    <div class="card-body weekly-session-chip-body">
        <div class="row-between-sm weekly-session-top">
            <strong>{{ item.starts_at|date:"H:i" }}</strong>
            <span class="pill{% if item.occupancy_pill_class %} {{ item.occupancy_pill_class }}{% endif %}">{{ item.occupancy_label }}</span>
        </div>
        <div class="card-content weekly-session-chip-content">
            <p class="weekly-session-title">{{ item.object.title }}</p>
            <p class="class-grid-meta">{{ item.coach_name }}</p>
            <p class="class-grid-meta">{{ item.occupied_slots }}/{{ item.capacity }} lugar(es)</p>
        </div>
        {% if page.capabilities.can_manage_classes %}
        {% url 'class-grid' as class_grid_url %}
        <div class="card-footer class-chip-actions">
            <div class="actions actions-tight">
                <a class="button secondary button-sm" href="{{ class_grid_url }}?{% if page.behavior.current_query_string %}{{ page.behavior.current_query_string }}&{% endif %}edit_session={{ item.object.id }}#edicao-aula" data-action="open-class-grid-session-edit">Editar</a>
                <form method="post" data-action="delete-class-grid-session">
                    {% csrf_token %}
                    <input type="hidden" name="form_kind" value="session-action">
                    <input type="hidden" name="action" value="delete-session">
                    <input type="hidden" name="session_id" value="{{ item.object.id }}">
                    <input type="hidden" name="return_query" value="{{ page.behavior.current_query_string }}">
                    <button class="button secondary button-sm" type="submit" data-action="confirm-class-grid-session-delete">Excluir</button>
                </form>
            </div>
        </div>
        {% endif %}
    </div>
</article>
<!--
ARQUIVO: class_grid_weekly_session_chip.html
POR QUE ELE EXISTE:
- Concentra a leitura curta de uma sessão dentro da visão semanal.
O QUE ESTE ARQUIVO FAZ:
- Renderiza o chip de uma sessão semanal, mostrando horários, coach e ocupação.
PONTOS CRITICOS:
- Depende do objeto 'item' e do contexto de page.
-->
