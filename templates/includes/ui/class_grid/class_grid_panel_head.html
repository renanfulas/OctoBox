<div class="class-grid-panel-head" data-slot="class-grid-panel-head">
    <div class="{{ header_class|default:'class-day-header class-grid-panel-title' }}" data-slot="class-grid-panel-title">
        <div>
            <p class="eyebrow">{{ eyebrow }}</p>
            {% if title %}
            <h2 class="{{ title_class|default:'section-title-sm' }}">{{ title }}</h2>
            {% endif %}
            {% if summary %}
            <p class="{{ summary_class|default:'class-day-summary' }}">{{ summary }}</p>
            {% endif %}
        </div>
        <div class="{{ badges_class|default:'class-grid-head-badges' }}" data-slot="class-grid-panel-actions">
            {% if pill_label %}
            <span class="pill{% if pill_class %} {{ pill_class }}{% endif %}">{{ pill_label }}</span>
            {% endif %}
            {% if button_label %}
            <button class="{{ button_class|default:'button secondary' }}" type="button"{% if button_id %} id="{{ button_id }}"{% endif %}>{{ button_label }}</button>
            {% endif %}
        </div>
    </div>
</div>
<!--
ARQUIVO: class_grid_panel_head.html
POR QUE ELE EXISTE:
- Concentra o padrão visual de título, resumo, badges, ação opcional e alça de arraste dos painéis da grade.
O QUE ESTE ARQUIVO FAZ:
- Renderiza o cabeçalho dos painéis da grade, com opções de personalização.
PONTOS CRITICOS:
- Depende dos parâmetros de contexto (eyebrow, title, summary, etc).
-->
