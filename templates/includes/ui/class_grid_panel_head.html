<!--
ARQUIVO: cabecalho reutilizavel dos paineis da grade.

POR QUE ELE EXISTE:
- concentra o padrao visual de titulo, resumo, badges, acao opcional e alca de arraste.
-->
<div class="class-grid-panel-head" data-slot="class-grid-panel-head">
    <div class="{{ header_class|default:'class-day-header class-grid-panel-title' }}" data-slot="class-grid-panel-title">
        <div>
            <p class="eyebrow">{{ eyebrow }}</p>
            {% if title %}
            <h2 class="{{ title_class|default:'section-title-sm' }}">{{ title }}</h2>
            {% endif %}
            {% if summary %}
            <p class="{{ summary_class|default:'class-day-summary' }}">{{ summary }}</p>
            {% endif %}
        </div>
        <div class="{{ badges_class|default:'class-grid-head-badges' }}" data-slot="class-grid-panel-actions">
            {% if pill_label %}
            <span class="pill{% if pill_class %} {{ pill_class }}{% endif %}">{{ pill_label }}</span>
            {% endif %}
            {% if button_label %}
            <button class="{{ button_class|default:'button secondary' }}" type="button"{% if button_id %} id="{{ button_id }}"{% endif %} data-action="class-grid-panel-button">{{ button_label }}</button>
            {% endif %}
            {% if handle_aria %}
            <span class="class-grid-grab-handle" data-drag-handle data-action="drag-class-grid-panel" role="button" tabindex="0" aria-label="{{ handle_aria }}">Mover painel</span>
            {% endif %}
        </div>
    </div>
</div>
