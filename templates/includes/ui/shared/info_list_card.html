<!--
ARQUIVO: info_list_card.html
POR QUE ELE EXISTE:
- Exibe um card de lista de informações operacionais.
O QUE ESTE ARQUIVO FAZ:
- Renderiza uma lista de itens, com título, copy e texto vazio opcional.
PONTOS CRITICOS:
- Depende dos parâmetros items, eyebrow, title, copy, etc.
-->
<article class="table-card{% if card_class %} {{ card_class }}{% endif %}">
    <div class="card-body card-body-list">
        {% include "includes/ui/layout/operation_card_head.html" with eyebrow=eyebrow title=title copy=copy pill_label=pill_label pill_class=pill_class %}
        <div class="card-content">
            <ul class="capability-list card-list">
                {% for item in items %}
                <li class="card-list-item">{{ item }}</li>
                {% empty %}
                <li class="card-list-item">{{ empty_text|default:'Sem itens disponíveis.' }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</article>
