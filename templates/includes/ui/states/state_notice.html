<!--
ARQUIVO: state_notice.html
POR QUE ELE EXISTE:
- Exibe avisos, alertas e mensagens de status.
O QUE ESTE ARQUIVO FAZ:
- Renderiza título, cópia, badge e dicas para estados de aviso.
PONTOS CRITICOS:
- Depende dos parâmetros tone, title, copy, badge, etc.
-->
<div class="state-notice state-notice-{{ tone|default:'info' }}{% if compact %} is-compact{% endif %}{% if class_name %} {{ class_name }}{% endif %}" role="status">
    <div class="state-notice-head">
        <div>
            {% if eyebrow %}<p class="eyebrow">{{ eyebrow }}</p>{% endif %}
            {% if title %}<h3 class="state-notice-title">{{ title }}</h3>{% endif %}
            {% if copy %}<p class="state-notice-copy">{{ copy }}</p>{% endif %}
        </div>
        {% if badge %}<span class="pill{% if badge_class %} {{ badge_class }}{% endif %}">{{ badge }}</span>{% endif %}
    </div>
    {% if hint %}<p class="state-notice-hint">{{ hint }}</p>{% endif %}
</div>
