<div class="profile-menu-container">
    <button
        class="topbar-profile"
        type="button"
        data-slot="topbar-profile"
        aria-expanded="false"
        aria-haspopup="menu"
        aria-controls="topbar-profile-dropdown"
    >
        <div class="avatar" aria-hidden="true">
            <span class="avatar-glyph">OB</span>
        </div>
        <div class="profile-meta">
            <strong>{{ user.get_full_name|default:user.username }}</strong>
            <span>{{ current_role.label|default:"Sem papel definido" }}</span>
        </div>
    </button>
    <div class="profile-dropdown" id="topbar-profile-dropdown" role="menu" aria-label="Menu de perfil">
        <div class="profile-menu-list">
            {% for item in profile_navigation %}
            <a href="{{ item.href }}" class="profile-menu-item" role="menuitem">{{ item.label }}</a>
            {% endfor %}
            
            {% if profile_navigation %}
            <div class="profile-menu-divider"></div>
            {% endif %}
            
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="profile-menu-item is-danger" role="menuitem">Sair</button>
            </form>
        </div>
    </div>
</div>
