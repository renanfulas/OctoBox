<form class="global-search" method="get" action="{{ global_search_action }}" role="combobox" aria-expanded="false" aria-haspopup="listbox" aria-owns="search-autocomplete-list" aria-controls="search-autocomplete-list search-autocomplete-status" data-ui="global-search-form" data-panel="global-search" data-autocomplete-url="{% url 'api-v1-student-autocomplete' %}">
    <label class="visually-hidden" for="global-search-input">Buscar aluno ou WhatsApp</label>
    <input id="global-search-input" type="search" name="query" placeholder="Buscar aluno, telefone ou CPF" maxlength="150" autocomplete="off" spellcheck="false" enterkeyhint="search" aria-autocomplete="list" aria-controls="search-autocomplete-list" aria-describedby="search-autocomplete-status" data-ui="global-search-input">
    <ul id="search-autocomplete-list" class="search-autocomplete-list" role="listbox" aria-label="Resultados da busca" hidden data-ui="global-search-results"></ul>
    <p id="search-autocomplete-status" class="search-status visually-hidden" aria-live="polite" data-ui="global-search-status"></p>
</form>
