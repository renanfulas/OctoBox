<!--
ARQUIVO: page_hero.html
POR QUE ELE EXISTE:
- Exibe o bloco hero generico de paginas.
O QUE ESTE ARQUIVO FAZ:
- Renderiza titulo, copia, acoes e painel aninhado do hero.
PONTOS CRITICOS:
- Depende do objeto 'hero' e seus atributos.
-->
<section class="hero hero--system operation-hero{% if hero_variant_class %} {{ hero_variant_class }}{% endif %}{% for class_name in hero.classes %} {{ class_name }}{% endfor %}" aria-label="{{ hero.aria_label }}"{% if hero.data_slot %} data-slot="{{ hero.data_slot }}"{% endif %}{% if hero.data_panel %} data-panel="{{ hero.data_panel }}"{% endif %}>
    <div class="operation-hero-main">
        <div class="operation-hero-copy-block">
            <p class="operation-hero-eyebrow eyebrow">{{ hero.eyebrow }}</p>
            <div class="operation-hero-text-stack">
                {% if hero.heading_level == 'h1' %}
                <h1 class="operation-hero-title" data-max-lines="{{ hero.contract.max_title_lines }}">{{ hero.title }}</h1>
                {% else %}
                <h2 class="operation-hero-title" data-max-lines="{{ hero.contract.max_title_lines }}">{{ hero.title }}</h2>
                {% endif %}
                <p class="operation-hero-copy" data-max-lines="{{ hero.contract.max_copy_lines }}">{{ hero.copy }}</p>
            </div>
            {% if hero.actions %}
            <div class="operation-hero-action-rail"{% if hero.actions_slot %} data-slot="{{ hero.actions_slot }}"{% endif %}>
                {% for action in hero.actions %}
                <a class="button{% if action.kind == 'secondary' %} secondary{% endif %}{% if action.class_name %} {{ action.class_name }}{% endif %}" href="{{ action.href }}"{% if action.data_action %} data-action="{{ action.data_action }}"{% endif %}>{{ action.label }}</a>
                {% endfor %}
            </div>
            {% endif %}
        </div>

        {% if nested_include %}
        <div class="operation-hero-nested-panel{% if nested_panel_class %} {{ nested_panel_class }}{% endif %}">
            {% include nested_include %}
        </div>
        {% endif %}
    </div>
</section>
