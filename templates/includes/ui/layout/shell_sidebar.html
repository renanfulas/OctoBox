<!--
ARQUIVO: shell_sidebar.html
POR QUE ELE EXISTE:
- Exibe a barra lateral principal do shell do sistema.
O QUE ESTE ARQUIVO FAZ:
- Renderiza marca, identidade do usuario e navegacao principal do shell.
PONTOS CRITICOS:
- Depende do usuario autenticado, navegacao e contadores do shell.
-->
<aside class="sidebar" data-slot="sidebar" data-ui="sidebar">
    <div class="sidebar-head">
        <div class="brand-wrap">
            <div class="brand-mark" aria-hidden="true">OB</div>
            <div class="brand-copy">
                <p class="brand">OctoBox Control</p>
                <p class="tagline">Gestao viva do box com leitura comercial e rotina operacional clara.</p>
            </div>
        </div>
    </div>
    {% if user.is_authenticated %}
    <div class="sidebar-body">
        <div class="sidebar-block sidebar-meta">
            <strong class="sidebar-user-name">{{ user.get_full_name|default:user.username }}</strong>
        </div>
        <nav class="sidebar-nav" aria-label="Navegacao principal">
            {% for item in sidebar_navigation %}
            <a class="nav-link{% if item.is_active %} is-active{% endif %}" data-nav-key="{{ item.nav_key }}" href="{{ item.href }}" {% if item.is_active %}aria-current="page"{% endif %}>
                <span class="nav-icon" aria-hidden="true">{{ item.icon|safe }}</span>
                <span class="nav-label">{{ item.label }}</span>
            </a>
            {% endfor %}
        </nav>
    </div>
    {% else %}
    <nav class="sidebar-nav" aria-label="Navegacao principal">
        <a class="nav-link" href="{% url 'login' %}">
            <span class="nav-icon" aria-hidden="true">+</span>
            <span class="nav-label">Entrar</span>
        </a>
    </nav>
    {% endif %}
</aside>
