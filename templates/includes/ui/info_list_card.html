<article class="table-card{% if card_class %} {{ card_class }}{% endif %}">
    <div class="card-body card-body-list">
        {% include "includes/ui/operation_card_head.html" with eyebrow=eyebrow title=title copy=copy pill_label=pill_label pill_class=pill_class %}
        <div class="card-content">
            <ul class="capability-list card-list">
                {% for item in items %}
                <li class="card-list-item">{{ item }}</li>
                {% empty %}
                <li class="card-list-item">{{ empty_text|default:'Sem itens disponíveis.' }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</article>
