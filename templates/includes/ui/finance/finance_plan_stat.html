<!--
ARQUIVO: estatistica reutilizavel de plano.

POR QUE ELE EXISTE:
- evita repetir o mesmo bloco de valor e legenda dentro do portfolio financeiro.
-->
<article class="finance-plan-stat{% if extra_class %} {{ extra_class }}{% endif %}">
    <strong{% if value_class %} class="{{ value_class }}"{% endif %}>{{ value }}</strong>
    <span>{{ label }}</span>
</article>
