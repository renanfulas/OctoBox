{% load l10n %}
<article class="finance-mix-card">
    <div class="card-body finance-mix-card-body">
        <div class="row-between-sm finance-mix-head">
            <strong>{{ item.name }}</strong>
            <span class="text-muted">{{ item.share|floatformat:1 }}% da receita</span>
        </div>
        <div class="card-content finance-mix-card-content">
            <div class="mix-bar-track">
                <div class="mix-bar-fill" data-visual-width="{{ item.width|unlocalize }}"></div>
            </div>
            <p class="meta-text-sm finance-inline-currency">R$ {{ item.revenue_this_month|floatformat:2 }} no mes &bull; {{ item.active_enrollments }} ativos</p>
        </div>
    </div>
</article>
<!--
ARQUIVO: finance_mix_card.html
POR QUE ELE EXISTE:
- centraliza a leitura de participacao e receita no mix comercial.
O QUE ESTE ARQUIVO FAZ:
- renderiza o card de participacao e receita de um item do mix financeiro.
PONTOS CRITICOS:
- depende do objeto 'item'.
-->
