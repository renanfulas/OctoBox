<article class="finance-mix-card">
    <div class="card-body finance-mix-card-body">
        <div class="row-between-sm finance-mix-head">
            <strong>{{ item.name }}</strong>
            <span class="text-muted">{{ item.active_enrollments }} ativos</span>
        </div>
        <div class="card-content finance-mix-card-content">
            <div class="mix-bar-track">
                <div class="mix-bar-fill" data-visual-width="{{ item.width }}"></div>
            </div>
            <p class="meta-text-sm finance-inline-currency">Receita recebida no mes: R$ {{ item.revenue_this_month|floatformat:2 }}</p>
        </div>
    </div>
</article>
<!--
ARQUIVO: finance_mix_card.html
POR QUE ELE EXISTE:
- Centraliza a leitura de participação e receita no mix comercial.
O QUE ESTE ARQUIVO FAZ:
- Renderiza o card de participação e receita de um item do mix financeiro.
PONTOS CRITICOS:
- Depende do objeto 'item'.
-->
