<!--
ARQUIVO: campos principais da edicao rapida da grade.

POR QUE ELE EXISTE:
- concentra os campos estruturais que normalmente mudam juntos na edicao da sessao.
-->
<div class="field-grid-220">
    <label>
        <span class="field-label">{{ page.data.session_edit_form.title.label }}</span>
        {{ page.data.session_edit_form.title }}
        {% for error in page.data.session_edit_form.title.errors %}<span class="form-error">{{ error }}</span>{% endfor %}
    </label>
    <label>
        <span class="field-label">{{ page.data.session_edit_form.coach.label }}</span>
        {{ page.data.session_edit_form.coach }}
        {% for error in page.data.session_edit_form.coach.errors %}<span class="form-error">{{ error }}</span>{% endfor %}
    </label>
    <label>
        <span class="field-label">{{ page.data.session_edit_form.start_time.label }}</span>
        {{ page.data.session_edit_form.start_time }}
        {% for error in page.data.session_edit_form.start_time.errors %}<span class="form-error">{{ error }}</span>{% endfor %}
    </label>
    <label>
        <span class="field-label">{{ page.data.session_edit_form.duration_minutes.label }}</span>
        {{ page.data.session_edit_form.duration_minutes }}
        {% for error in page.data.session_edit_form.duration_minutes.errors %}<span class="form-error">{{ error }}</span>{% endfor %}
    </label>
    <label>
        <span class="field-label">{{ page.data.session_edit_form.capacity.label }}</span>
        {{ page.data.session_edit_form.capacity }}
        {% for error in page.data.session_edit_form.capacity.errors %}<span class="form-error">{{ error }}</span>{% endfor %}
    </label>
    <label>
        <span class="field-label">{{ page.data.session_edit_form.status.label }}</span>
        {{ page.data.session_edit_form.status }}
        {% for error in page.data.session_edit_form.status.errors %}<span class="form-error">{{ error }}</span>{% endfor %}
    </label>
</div>
