<!--
ARQUIVO: workspace_quick_edit_notes.html
POR QUE ELE EXISTE:
- Separa o bloco textual da sessão para ajustes de copy e feedback sem ruir o restante do formulário.
O QUE ESTE ARQUIVO FAZ:
- Renderiza o campo de observações e exibe erros gerais do formulário.
PONTOS CRITICOS:
- Depende de page.data.session_edit_form.notes e non_field_errors.
-->
<label>
    <span class="field-label">{{ page.data.session_edit_form.notes.label }}</span>
    {{ page.data.session_edit_form.notes }}
    {% for error in page.data.session_edit_form.notes.errors %}<span class="form-error">{{ error }}</span>{% endfor %}
</label>
{% for error in page.data.session_edit_form.non_field_errors %}<span class="form-error">{{ error }}</span>{% endfor %}
