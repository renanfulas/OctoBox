<!--
ARQUIVO: painel semanal da grade.
-->
<section class="card class-grid-surface-card class-weekly-board" id="weekly-board" data-panel="class-grid-weekly-board">
    {% for week in page.data.weekly_calendar|slice:":2" %}
    <section class="weekly-calendar-section" data-panel="class-grid-weekly-section">
        <div class="row-between-md weekly-calendar-header">
            <div>
                <p class="eyebrow">{{ week.label }}</p>
            </div>
            <span class="pill info">Seg a Dom</span>
        </div>

        <div class="weekly-calendar-grid">
            {% for day in week.days %}
            {% include "includes/ui/class_grid/class_grid_weekly_day_card.html" with day=day page=page %}
            {% endfor %}
        </div>
    </section>
    {% endfor %}
</section>
