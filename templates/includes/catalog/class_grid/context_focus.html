<!--
ARQUIVO: foco inicial e atalhos da grade.
-->
<section class="class-grid-quick-grid section-gap" aria-label="Foco e atalhos da grade">
    <article class="table-card class-grid-focus-card">
        <div class="row-between-md class-grid-focus-head">
            <div>
                <p class="eyebrow">Comece por aqui</p>
                <h2 class="section-title-sm">Leia a grade sem se perder antes da hora</h2>
            </div>
            <span class="pill info">Ordem sugerida</span>
        </div>
        <div class="class-grid-focus-list">
            {% for item in page.data.operational_focus %}
            <article class="class-grid-focus-item">
                <div class="class-grid-focus-copy">
                    <h3>{{ item.title }}</h3>
                    <p>{{ item.summary }}</p>
                </div>
                <div class="class-grid-focus-actions">
                    <a class="button secondary button-sm" href="{{ item.action_href }}">{{ item.action_label }}</a>
                </div>
            </article>
            {% endfor %}
        </div>
    </article>
</section>
