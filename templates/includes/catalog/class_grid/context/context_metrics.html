<!--
ARQUIVO: metricas da grade.
-->
<div class="owner-metrics-panel section-gap" data-panel="class-grid-metrics">
    <section class="panel-grid operation-metric-grid owner-metric-grid" aria-label="Metricas da grade">
        {% for label, item in page.data.class_metrics.items %}
        <article class="card dashboard-kpi-card is-ledger glass-panel">
            <div class="card-body card-body-metric">
                <div class="card-value-stack">
                    <p class="eyebrow card-label">{{ label }}</p>
                    <p class="metric card-value"><span class="metric-number">{{ item.value }}</span></p>
                </div>
                <div class="card-content">
                    <p class="metric-note card-copy">{{ item.note }}</p>
                </div>
            </div>
        </article>
        {% endfor %}
    </section>
</div>
