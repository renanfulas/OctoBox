<!--
ARQUIVO: métricas da grade de aulas.

POR QUE ELE EXISTE:
- Exibe indicadores-chave da grade para leitura rápida.

O QUE ESTE ARQUIVO FAZ:
1. Mostra métricas principais da grade.
2. Usa operation-metric-grid para visualização.

PONTOS CRITICOS:
- Depende de class_metrics no contexto.
-->
<div class="class-grid-metrics-panel section-gap" data-panel="class-grid-metrics">
    <section class="class-grid-metric-grid" aria-label="Metricas da grade">
        {% for label, item in page.data.class_metrics.items %}
        <article class="card dashboard-kpi-card is-ledger glass-panel class-grid-metric-card">
            <div class="card-body card-body-metric">
                <div class="card-value-stack">
                    <p class="eyebrow card-label">{{ label }}</p>
                    <p class="metric card-value"><span class="metric-number">{{ item.value }}</span></p>
                </div>
                <div class="card-content">
                    <p class="metric-note card-copy">{{ item.note }}</p>
                </div>
            </div>
        </article>
        {% endfor %}
    </section>
</div>
