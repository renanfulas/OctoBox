<!--
ARQUIVO: workspace_planner_notes_and_actions.html
POR QUE ELE EXISTE:
- Separa notas e ações do planejador recorrente.
O QUE ESTE ARQUIVO FAZ:
- Renderiza campo de notas, checkbox e botões de ação do formulário.
PONTOS CRITICOS:
- Depende de page.data.schedule_form.notes, skip_existing e non_field_errors.
-->
<label>
    <span class="field-label">{{ page.data.schedule_form.notes.label }}</span>
    {{ page.data.schedule_form.notes }}
    {% for error in page.data.schedule_form.notes.errors %}<span class="form-error">{{ error }}</span>{% endfor %}
</label>
<label class="class-grid-checkbox">
    {{ page.data.schedule_form.skip_existing }}
    <span>{{ page.data.schedule_form.skip_existing.label }}</span>
</label>
{% for error in page.data.schedule_form.non_field_errors %}<span class="form-error">{{ error }}</span>{% endfor %}
<div class="actions actions-tight operation-hero-action-rail">
    <button class="button" type="submit">Gerar aulas recorrentes</button>
</div>
