<!--
ARQUIVO: campos principais do planejador recorrente.
-->
<div class="field-grid-220">
    <label>
        <span class="field-label">{{ page.data.schedule_form.title.label }}</span>
        {{ page.data.schedule_form.title }}
        {% for error in page.data.schedule_form.title.errors %}<span class="form-error">{{ error }}</span>{% endfor %}
    </label>
    <label>
        <span class="field-label">{{ page.data.schedule_form.coach.label }}</span>
        {{ page.data.schedule_form.coach }}
        {% for error in page.data.schedule_form.coach.errors %}<span class="form-error">{{ error }}</span>{% endfor %}
    </label>
    <label>
        <span class="field-label">{{ page.data.schedule_form.start_time.label }}</span>
        {{ page.data.schedule_form.start_time }}
        {% if page.data.schedule_form.start_time.help_text %}<small class="meta-text">{{ page.data.schedule_form.start_time.help_text }}</small>{% endif %}
        {% for error in page.data.schedule_form.start_time.errors %}<span class="form-error">{{ error }}</span>{% endfor %}
    </label>
    <label>
        <span class="field-label">{{ page.data.schedule_form.sequence_count.label }}</span>
        {{ page.data.schedule_form.sequence_count }}
        <small class="meta-text" id="sequence-count-live-copy" aria-live="polite"></small>
        {% if page.data.schedule_form.sequence_count.help_text %}<small class="meta-text">{{ page.data.schedule_form.sequence_count.help_text }}</small>{% endif %}
        {% for error in page.data.schedule_form.sequence_count.errors %}<span class="form-error">{{ error }}</span>{% endfor %}
    </label>
    <label>
        <span class="field-label">{{ page.data.schedule_form.duration_minutes.label }}</span>
        {{ page.data.schedule_form.duration_minutes }}
        {% for error in page.data.schedule_form.duration_minutes.errors %}<span class="form-error">{{ error }}</span>{% endfor %}
    </label>
    <label>
        <span class="field-label">{{ page.data.schedule_form.capacity.label }}</span>
        {{ page.data.schedule_form.capacity }}
        {% for error in page.data.schedule_form.capacity.errors %}<span class="form-error">{{ error }}</span>{% endfor %}
    </label>
    <label>
        <span class="field-label">{{ page.data.schedule_form.status.label }}</span>
        {{ page.data.schedule_form.status }}
        {% for error in page.data.schedule_form.status.errors %}<span class="form-error">{{ error }}</span>{% endfor %}
    </label>
    <label>
        <span class="field-label">{{ page.data.schedule_form.start_date.label }}</span>
        {{ page.data.schedule_form.start_date }}
        <small class="meta-text">Ex.: 11/03/26</small>
        {% for error in page.data.schedule_form.start_date.errors %}<span class="form-error">{{ error }}</span>{% endfor %}
    </label>
    <label>
        <span class="field-label">{{ page.data.schedule_form.end_date.label }}</span>
        {{ page.data.schedule_form.end_date }}
        <small class="meta-text">Ex.: 08/04/26</small>
        {% for error in page.data.schedule_form.end_date.errors %}<span class="form-error">{{ error }}</span>{% endfor %}
    </label>
</div>
