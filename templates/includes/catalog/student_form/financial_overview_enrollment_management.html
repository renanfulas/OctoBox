<!--
ARQUIVO: gestao formal da matricula do aluno.
-->
{% if page.data.enrollment_management_form %}
<article class="table-card section-gap-top-sm" id="student-enrollment-management">
    <p class="eyebrow">Gestao formal da matricula</p>
    <form method="post" action="/alunos/{{ page.data.student_object.id }}/matricula/acao/" class="form-stack">
        {% csrf_token %}
        {{ page.data.enrollment_management_form.enrollment_id }}
        <div class="field-grid-220">
            <label>
                <span class="field-label">{{ page.data.enrollment_management_form.action_date.label }}</span>
                {{ page.data.enrollment_management_form.action_date }}
            </label>
            <label>
                <span class="field-label">{{ page.data.enrollment_management_form.reason.label }}</span>
                {{ page.data.enrollment_management_form.reason }}
            </label>
        </div>
        <div class="actions actions-tight">
            <button class="button secondary" type="submit" name="action" value="cancel-enrollment">Cancelar matricula</button>
            <button class="button" type="submit" name="action" value="reactivate-enrollment">Reativar matricula</button>
        </div>
    </form>
</article>
{% endif %}
