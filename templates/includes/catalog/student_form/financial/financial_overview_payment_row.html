<tr>
    <td class="text-muted">{{ payment.due_date|date:"d/m/Y" }}</td>
    <td class="font-medium text-ink">{{ payment.amount|floatformat:2 }}</td>
    <td class="font-semibold status-{{ payment.status }}">
        {{ payment.get_status_display|upper }}
    </td>
    <td class="text-dimmed">{{ payment.get_method_display }}</td>
    <td>
        {% if payment.status != 'paid' %}
        <button class="payment-link-btn js-generate-payment-link" data-payment-id="{{ payment.id }}">
            <span>Copiar Link 🔗</span>
        </button>
        {% else %}
        <span class="meta-text text-xs">Liquidado</span>
        {% endif %}
    </td>
</tr>
