{% load static %}
<header class="student-financial-topbar" aria-label="Comando contextual do financeiro">
    <div class="student-financial-topbar-search">
        <span class="student-financial-topbar-search-icon" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
        </span>
        <input type="text" class="student-financial-topbar-search-input" placeholder="Buscar aluno, telefone ou CPF..." aria-label="Buscar aluno, telefone ou CPF">
    </div>

    <div class="student-financial-topbar-actions">
        <button class="button secondary" type="button">
            <span>+ Aluno</span>
        </button>
        <button class="button secondary" type="button">
            <span>+ Entrada</span>
        </button>

        <div class="student-financial-topbar-notice-strip" aria-label="Sinais rapidos do financeiro">
            <span class="student-financial-topbar-notice-label">0 vencimentos</span>
            <span class="student-financial-topbar-ping is-warning" aria-hidden="true"></span>
            <span class="student-financial-topbar-notice-value">9999 entradas</span>
        </div>

        <div class="student-financial-topbar-avatar" aria-label="Usuario atual">
            <span>A</span>
        </div>
    </div>
</header>
