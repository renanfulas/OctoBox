{% load static %}
<header class="elite-financial-topbar">
    
    <!-- Busca Contextual -->
    <div class="elite-search-wrapper">
        <span class="elite-search-icon">🔍</span>
        <input type="text" class="elite-search-input" placeholder="Buscar aluno, telefone ou CPF...">
    </div>

    <!-- Ações Globais -->
    <div class="elite-topbar-actions">
        <button class="button secondary elite-button-sm">
            <span>+ Aluno</span>
        </button>
        <button class="button secondary elite-button-sm">
            <span>+ Entrada</span>
        </button>
        
        <!-- Notificações / Pills -->
        <div class="elite-notification-pill-strip">
            <span class="text-elite-muted">0 vencimentos</span>
            <span class="elite-ping-dot orange"></span>
            <span class="text-orange font-bold">9999 entradas</span>
        </div>

        <!-- Avatar do Usuário -->
        <div class="elite-avatar-small">
            <span>A</span>
        </div>
    </div>

</header>
