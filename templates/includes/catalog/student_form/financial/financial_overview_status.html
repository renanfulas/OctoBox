<!-- Financial Overview Quick Panels - Elite Standard -->
<section class="elite-panel-grid student-financial-metrics section-gap-top-xs" aria-label="Metricas financeiras">
    <article class="card glass-panel-elite elite-panel--compact">
        <p class="elite-hero__eyebrow elite-text-dimmed" style="font-size: 0.65rem;">Matrículas Ativas</p>
        <p class="text-2xl font-extrabold" style="color: var(--elite-primary);">{{ page.data.financial_overview.metrics.matriculas_ativas|default:"0" }}</p>
    </article>

    <article class="card glass-panel-elite elite-panel--compact">
        <p class="elite-hero__eyebrow elite-text-dimmed" style="font-size: 0.65rem;">Pagamentos Pendentes</p>
        <p class="text-2xl font-extrabold" style="color: var(--elite-accent);">{{ page.data.financial_overview.metrics.pagamentos_pendentes|default:"0" }}</p>
    </article>

    <article class="card glass-panel-elite elite-panel--compact">
        <p class="elite-hero__eyebrow elite-text-dimmed" style="font-size: 0.65rem;">Pagamentos Atrasados</p>
        <p class="text-2xl font-extrabold" style="color: var(--elite-danger);">{{ page.data.financial_overview.metrics.pagamentos_atrasados|default:"0" }}</p>
    </article>
</section>
