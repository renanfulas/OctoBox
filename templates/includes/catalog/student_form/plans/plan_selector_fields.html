<div class="field-grid-220 student-form-plan-grid">
    <label class="student-form-plan-field">
        <span class="field-label">{{ form.selected_plan.label }}</span>
        {{ form.selected_plan }}
        {% for error in form.selected_plan.errors %}<small class="form-error">{{ error }}</small>{% endfor %}
    </label>
    <div class="student-form-inline-metric student-form-inline-metric--plan">
        <span class="field-label text-dimmed">Valor esperado</span>
        <div class="student-form-inline-metric__value-row">
            <input id="connected-plan-price" type="text" value="--" readonly class="text-bold student-plan-expected-price w-120">
            <span id="plan-swap-status" class="plan-swap-status" hidden>
                <span id="plan-swap-pill" class="pill text-xs text-bold"></span>
            </span>
            <div id="price-delta-indicator" class="price-delta-indicator text-xs text-bold" hidden></div>
        </div>
    </div>
</div>
