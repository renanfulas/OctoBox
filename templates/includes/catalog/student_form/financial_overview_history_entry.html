<div class="history-entry">
    <div class="row-between history-header">
        <strong>{{ enrollment.plan.name }}</strong>
        <span class="pill{% if enrollment.status == 'expired' or enrollment.status == 'canceled' %} warning{% endif %}">{{ enrollment.get_status_display }}</span>
    </div>
    <p class="meta-text-sm">Inicio em {{ enrollment.start_date|date:"d/m/Y" }}{% if enrollment.end_date %} | Fim em {{ enrollment.end_date|date:"d/m/Y" }}{% endif %}</p>
    {% if enrollment.notes %}<p class="meta-text">{{ enrollment.notes }}</p>{% endif %}
</div>
