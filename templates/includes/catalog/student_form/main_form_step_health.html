<!--
ARQUIVO: passo de saude e identificacao da ficha do aluno.
-->
<details id="student-form-health" class="disclosure-panel"{% if form.health_issue_status.errors or form.cpf.errors or form.notes.errors %} open{% endif %}>
    <summary>Passo 3: saude e identificacao</summary>
    <div class="stack-16 section-gap-top-xs">
        <div class="field-grid-220">
            <label>
                <span class="field-label">{{ form.health_issue_status.label }}</span>
                {{ form.health_issue_status }}
                {% for error in form.health_issue_status.errors %}<small class="form-error">{{ error }}</small>{% endfor %}
            </label>
            <label>
                <span class="field-label">{{ form.cpf.label }}</span>
                {{ form.cpf }}
                {% for error in form.cpf.errors %}<small class="form-error">{{ error }}</small>{% endfor %}
            </label>
        </div>
        <label>
            <span class="field-label">{{ form.notes.label }}</span>
            {{ form.notes }}
            {% for error in form.notes.errors %}<small class="form-error">{{ error }}</small>{% endfor %}
        </label>
    </div>
</details>
