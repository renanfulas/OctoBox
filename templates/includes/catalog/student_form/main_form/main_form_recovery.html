<!--
ARQUIVO: bloco de recuperacao/intermediacao do formulario.
-->
{% if student_form_recovery_guide %}
<div class="note-panel note-panel-danger student-form-recovery-panel" role="alert">
    <p class="eyebrow">Guia de recuperacao</p>
    <p class="no-margin"><strong>{{ student_form_recovery_guide.title }}</strong></p>
    <p class="meta-text">{{ student_form_recovery_guide.copy }}</p>
    <div class="stack-14 section-gap-top-xs student-form-recovery-list">
        {% for item in student_form_recovery_guide.items %}
        <div class="student-form-recovery-item">
            <p class="no-margin"><strong><a href="{{ item.href }}">{{ item.label }}</a></strong></p>
            <p class="meta-text">{{ item.summary }}</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endif %}
