<!--
ARQUIVO: passo essencial da ficha do aluno.
-->
<div id="student-form-essential" class="note-panel note-panel-warm student-form-step student-form-step-essential">
    <div class="student-form-step-intro">
        <p class="eyebrow">Passo 1: essencial</p>
        <h3 class="section-title-sm">Comece pelo minimo que sustenta o resto.</h3>
        <p class="meta-text">Nome completo e WhatsApp resolvem a maior parte do caminho. O restante entra para melhorar leitura e decisao.</p>
    </div>
    <div class="field-grid-240">
        <label>
            <span class="field-label">{{ form.full_name.label }}</span>
            {{ form.full_name }}
            {% for error in form.full_name.errors %}<small class="form-error">{{ error }}</small>{% endfor %}
        </label>
        <label>
            <span class="field-label">{{ form.phone.label }}</span>
            {{ form.phone }}
            {% for error in form.phone.errors %}<small class="form-error">{{ error }}</small>{% endfor %}
        </label>
    </div>
</div>
