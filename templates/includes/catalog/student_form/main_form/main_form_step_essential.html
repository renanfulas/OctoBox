<!--
ARQUIVO: passo essencial da ficha do aluno.
-->
<div id="student-form-essential" class="student-form-step student-form-step-essential student-form-step-essential--welcome">
    <div class="student-form-step-heading">
        <p class="student-form-step-kicker">Passo 1</p>
        <h3 class="student-form-step-title">Essencial</h3>
    </div>
    <div class="field-grid-240">
        <label>
            <span class="field-label">{{ form.full_name.label }}</span>
            {{ form.full_name }}
            {% for error in form.full_name.errors %}<small class="form-error">{{ error }}</small>{% endfor %}
        </label>
        <label>
            <span class="field-label">{{ form.phone.label }}</span>
            {{ form.phone }}
            {% for error in form.phone.errors %}<small class="form-error">{{ error }}</small>{% endfor %}
        </label>
    </div>
</div>
