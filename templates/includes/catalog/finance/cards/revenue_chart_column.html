<!--
ARQUIVO: coluna de gráfico de receita mensal do financeiro.

POR QUE ELE EXISTE:
- Exibe barra de receita mensal no gráfico de tendência.

O QUE ESTE ARQUIVO FAZ:
1. Mostra barra proporcional à receita do mês.
2. Exibe label e valor formatado.

PONTOS CRITICOS:
- Depende de item e page.data.comparison_peaks.
-->
<div class="finance-revenue-column finance-revenue-column--{{ item.performance_state }}">
    <div class="finance-revenue-column-bars">
        <div class="finance-revenue-bar is-expected" data-visual-height="{{ item.expected_height }}" title="{{ item.performance_label }} | Esperado: R$ {{ item.expected_value|floatformat:2 }}"></div>
        <div class="finance-revenue-bar is-realized" data-visual-height="{{ item.realized_height }}" title="{{ item.performance_label }} | Realizado: R$ {{ item.realized_value|floatformat:2 }}"></div>
    </div>
    <strong class="finance-revenue-column-label">{{ item.label }}</strong>
</div>
