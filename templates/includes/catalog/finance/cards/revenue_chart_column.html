<!--
ARQUIVO: coluna de gráfico de receita mensal do financeiro.

POR QUE ELE EXISTE:
- Exibe barra de receita mensal no gráfico de tendência.

O QUE ESTE ARQUIVO FAZ:
1. Mostra barra proporcional à receita do mês.
2. Exibe label e valor formatado.

PONTOS CRITICOS:
- Depende de item e page.data.comparison_peaks.
-->
<div class="finance-revenue-column">
    <div class="finance-revenue-column-bars">
        <div class="finance-revenue-bar is-expected" style="--finance-bar-height: {{ item.expected_height }}%;" title="Esperado: R$ {{ item.expected_value|floatformat:2 }}"></div>
        <div class="finance-revenue-bar is-realized" style="--finance-bar-height: {{ item.realized_height }}%;" title="Realizado: R$ {{ item.realized_value|floatformat:2 }}"></div>
    </div>
    <strong class="finance-revenue-column-label">{{ item.label }}</strong>
</div>
