<!--
ARQUIVO: card de métrica operacional do financeiro.

POR QUE ELE EXISTE:
- Exibe valor resumido de uma métrica operacional.

O QUE ESTE ARQUIVO FAZ:
1. Mostra label, valor e nota.

PONTOS CRITICOS:
- Usado em resumos e painéis de operação.
-->
<article class="finance-ops-metric-card">
    <p class="eyebrow">{{ label }}</p>
    <p class="metric">{{ value }}</p>
    <p class="metric-note">Resumo operacional da regua de cobranca e retencao.</p>
</article>
