<!--
ARQUIVO: linha de comparação de delta de ativos e cancelados.

POR QUE ELE EXISTE:
- Exibe barras comparativas de ativações e cancelamentos por período.

O QUE ESTE ARQUIVO FAZ:
1. Mostra saldo, barras de ativos e cancelados.
2. Usa widthratio para proporção visual.

PONTOS CRITICOS:
- Depende de item e page.data.comparison_peaks.
-->
<div class="delta-row">
    <div class="row-between-sm">
        <strong>{{ item.label }}</strong>
        <span class="pill{% if item.net_growth < 0 %} warning{% endif %}">Saldo {{ item.net_growth }}</span>
    </div>
    <div class="delta-track-group">
        <div>
            <div class="delta-label">Ativos</div>
            <div class="mix-bar-track"><div class="mix-bar-fill growth" data-visual-width="{% widthratio item.activations page.data.comparison_peaks.max_count 100 %}"></div></div>
        </div>
        <div>
            <div class="delta-label">Cancelados</div>
            <div class="mix-bar-track"><div class="mix-bar-fill churn" data-visual-width="{% widthratio item.cancellations page.data.comparison_peaks.max_count 100 %}"></div></div>
        </div>
    </div>
</div>
