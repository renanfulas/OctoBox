<!--
ARQUIVO: feedback de validacao do motor de planos.
-->
{% if page.data.form.errors %}
<div class="note-panel note-panel-danger finance-plan-feedback-card">
    <p class="eyebrow">Revise antes de salvar</p>
    <p class="meta-text no-margin">A tela marcou os campos com problema para impedir plano salvo com leitura quebrada.</p>
</div>
{% endif %}

{% if page.data.form.non_field_errors %}
<div class="note-panel note-panel-danger finance-plan-feedback-card">
    {% for error in page.data.form.non_field_errors %}
    <div>{{ error }}</div>
    {% endfor %}
</div>
{% endif %}
