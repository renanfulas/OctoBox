ARQUIVO: campos principais do motor de planos.

<div id="plan-create-core" class="field-grid-220 finance-plan-grid">
    <label>
        <span class="field-label">{{ page.data.form.name.label }}</span>
        {{ page.data.form.name }}
        {% for error in page.data.form.name.errors %}<small class="form-error">{{ error }}</small>{% endfor %}
    </label>
    <label>
        <span class="field-label">{{ page.data.form.price.label }}</span>
        {{ page.data.form.price }}
        {% for error in page.data.form.price.errors %}<small class="form-error">{{ error }}</small>{% endfor %}
    </label>
    <label>
        <span class="field-label">{{ page.data.form.billing_cycle.label }}</span>
        {{ page.data.form.billing_cycle }}
        {% for error in page.data.form.billing_cycle.errors %}<small class="form-error">{{ error }}</small>{% endfor %}
    </label>
    <label>
        <span class="field-label">{{ page.data.form.sessions_per_week.label }}</span>
        {{ page.data.form.sessions_per_week }}
        {% for error in page.data.form.sessions_per_week.errors %}<small class="form-error">{{ error }}</small>{% endfor %}
    </label>
    <label>
        <span class="field-label">{{ page.data.form.active.label }}</span>
        {{ page.data.form.active }}
        {% for error in page.data.form.active.errors %}<small class="form-error">{{ error }}</small>{% endfor %}
    </label>
</div>
