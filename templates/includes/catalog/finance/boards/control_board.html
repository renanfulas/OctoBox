<!--
ARQUIVO: recorte ativo e filtros do financeiro.

POR QUE ELE EXISTE:
- mantem o recorte financeiro visivel e pronto para fechamento operacional sem puxar exportacao para o fluxo principal.

O QUE ESTE ARQUIVO FAZ:
1. exibe filtros da leitura financeira.
2. resume o recorte ativo para contexto da operacao.
3. atualiza o contexto de forma acessivel para teclado e leitura assistida.
-->

<section class="card glass-panel finance-board-filter finance-board-filter--engine" data-panel="finance-filter-form">
    <div class="card-head">
        <h3 class="card-title">Filtros da Leitura Financeira</h3>
        <span class="badge badge-subtle info">Leitura ativa</span>
    </div>
    <form method="get" class="form-stack" data-action="filter-finance" id="finance-filter-form" aria-describedby="finance-filter-status">
        <div class="field-grid-200">
            <label>
                <span class="field-label">{{ page.data.finance_filter_form.months.label }}</span>
                {{ page.data.finance_filter_form.months }}
            </label>
            <label>
                <span class="field-label">{{ page.data.finance_filter_form.plan.label }}</span>
                {{ page.data.finance_filter_form.plan }}
            </label>
            <label>
                <span class="field-label">{{ page.data.finance_filter_form.payment_status.label }}</span>
                {{ page.data.finance_filter_form.payment_status }}
            </label>
            <label>
                <span class="field-label">{{ page.data.finance_filter_form.payment_method.label }}</span>
                {{ page.data.finance_filter_form.payment_method }}
            </label>
        </div>
        <div class="actions actions-tight">
            <button class="button" type="submit" data-action="apply-finance-filters">Aplicar filtros</button>
            <a class="button secondary" href="{% url 'finance-center' %}" data-action="clear-finance-filters">Limpar</a>
        </div>
    </form>
</section>

<section class="card glass-panel finance-support-card finance-support-card-tight finance-filter-summary-card finance-filter-summary-card--context" id="finance-control-board" data-panel="finance-control-summary" role="status" aria-live="polite" aria-atomic="true">
    <div class="card-head">
        <h3 class="card-title" id="finance-summary-title">Resumo do Recorte Ativo</h3>
        <span class="badge badge-subtle info">Contexto visivel</span>
    </div>
    <p id="finance-summary-description" class="visually-hidden">Confirme o recorte antes de seguir com cobranca, leitura e fechamento operacional.</p>
    <p id="finance-filter-status" class="visually-hidden" aria-live="polite"></p>
</section>
