<div class="delta-row">
    <div class="row-between-sm">
        <strong>{{ item.label }}</strong>
        <span class="pill{% if item.net_growth < 0 %} warning{% endif %}">Saldo {{ item.net_growth }}</span>
    </div>
    <div class="delta-track-group">
        <div>
            <div class="delta-label">Ativos</div>
            <div class="mix-bar-track"><div class="mix-bar-fill growth" style="--bar-width: {% widthratio item.activations page.data.comparison_peaks.max_count 100 %}%;"></div></div>
        </div>
        <div>
            <div class="delta-label">Cancelados</div>
            <div class="mix-bar-track"><div class="mix-bar-fill churn" style="--bar-width: {% widthratio item.cancellations page.data.comparison_peaks.max_count 100 %}%;"></div></div>
        </div>
    </div>
</div>
