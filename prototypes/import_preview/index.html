<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Import Preview — OctoBOX</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Import Preview</h1>

    <section class="controls">
      <label class="file-label">Selecionar CSV
        <input id="fileInput" type="file" accept=".csv" />
      </label>
      <button id="previewBtn" disabled>Pré-visualizar</button>
      <button id="importBtn" disabled>Iniciar importação</button>
    </section>

    <section id="summary" class="hidden">
      <div id="meta">
        <span id="rowsCount"></span>
        <span id="errorsCount"></span>
      </div>
      <div id="controlsMap" class="hint">Detectado cabeçalho automático. Mapeamento simples aplicado.</div>
    </section>

    <section id="preview" class="hidden">
      <table id="previewTable">
        <thead id="previewHead"></thead>
        <tbody id="previewBody"></tbody>
      </table>
    </section>

    <section id="validation" class="hidden">
      <h2>Erros de validação</h2>
      <ul id="errorList"></ul>
    </section>

    <section id="progressSection" class="hidden">
      <h2>Progresso da importação</h2>
      <div class="progress">
        <div id="progressBar" class="bar" style="width:0%"></div>
      </div>
      <div id="progressText"></div>
    </section>

    <footer class="note">Protótipo: preview do CSV, validação por linha e importação simulada.</footer>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
