name: VPS Deploy (Hostgator São Paulo)

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - OctoBox CI Checks (Performance & Integrity)
    types:
      - completed

permissions:
  actions: read
  contents: read

concurrency:
  group: vps-production-main
  cancel-in-progress: false

jobs:
  verify-gates:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    steps:
      - name: Verificar todos os gates obrigatórios
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.info('Dispatch manual — pulando verificação de gates.');
              return;
            }
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.payload.workflow_run.head_sha;
            const branch = context.payload.workflow_run.head_branch;
            const required = [
              "OctoBox CI Checks (Performance & Integrity)",
              "Student Onboarding Corridors Regression",
              "Student Onboarding Real Smoke",
              "Security Scanners 🛡️",
            ];
            const sleep = ms => new Promise(r => setTimeout(r, ms));
            let missing = [...required];
            for (let i = 1; i <= 20; i++) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner, repo, branch, head_sha: headSha, per_page: 50,
              });
              missing = required.filter(name => {
                const run = data.workflow_runs.find(r => r.name === name);
                return !run || run.conclusion !== 'success';
              });
              if (!missing.length) return;
              core.info(`Aguardando (${i}/20): ${missing.join(', ')}`);
              await sleep(30000);
            }
            core.setFailed(`Gates incompletos: ${missing.join(', ')}`);

  deploy:
    needs: verify-gates
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Deploy no VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:    ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:     ${{ secrets.VPS_SSH_KEY }}
          port:    ${{ secrets.VPS_PORT }}
          timeout: 2m
          command_timeout: 20m
          script: |
            set -euo pipefail
            APP=/srv/octobox/app
            VENV=/srv/octobox/venv
            ENV=/srv/octobox/shared/octobox.env

            echo "==> Pull do repositório..."
            git -C "$APP" fetch origin main
            git -C "$APP" reset --hard origin/main

            echo "==> Atualizando dependências Python..."
            "$VENV/bin/pip" install --quiet -r "$APP/requirements.txt"

            echo "==> Coletando static files..."
            set -a && source "$ENV" && set +a
            "$VENV/bin/python" "$APP/manage.py" collectstatic --noinput

            echo "==> Rodando migrations..."
            "$VENV/bin/python" "$APP/manage.py" migrate --noinput

            echo "==> Sincronizando roles..."
            "$VENV/bin/python" "$APP/manage.py" bootstrap_roles

            echo "==> Reiniciando Gunicorn..."
            systemctl restart octobox-gunicorn

            echo "==> Deploy concluído."

      - name: Health check pós-deploy
        run: |
          sleep 8
          curl --fail --silent --show-error https://app.octoboxfit.com.br/api/v1/health/
          echo " — OK"
