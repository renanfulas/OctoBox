name: VPS Deploy (Hostgator São Paulo)

on:
  workflow_run:
    workflows:
      - OctoBox CI Checks (Performance & Integrity)
    types:
      - completed

permissions:
  actions: read
  contents: read

concurrency:
  group: vps-production-main
  cancel-in-progress: false

jobs:
  verify-gates:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Verificar todos os gates obrigatórios
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.payload.workflow_run.head_sha;
            const branch = context.payload.workflow_run.head_branch;
            const required = [
              "OctoBox CI Checks (Performance & Integrity)",
              "Student Onboarding Corridors Regression",
              "Student Onboarding Real Smoke",
              "Security Scanners 🛡️",
            ];
            const sleep = ms => new Promise(r => setTimeout(r, ms));
            let missing = [...required];
            for (let i = 1; i <= 20; i++) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner, repo, branch, head_sha: headSha, per_page: 50,
              });
              missing = required.filter(name => {
                const run = data.workflow_runs.find(r => r.name === name);
                return !run || run.conclusion !== 'success';
              });
              if (!missing.length) return;
              core.info(`Aguardando (${i}/20): ${missing.join(', ')}`);
              await sleep(30000);
            }
            core.setFailed(`Gates incompletos: ${missing.join(', ')}`);

  deploy:
    needs: verify-gates
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Deploy no VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /srv/octobox

            echo "==> Pull do repositório..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> Atualizando dependências Python..."
            .venv/bin/pip install --quiet -r requirements.txt

            echo "==> Coletando static files..."
            .venv/bin/python manage.py collectstatic --noinput

            echo "==> Rodando migrations..."
            .venv/bin/python manage.py migrate --noinput

            echo "==> Sincronizando roles..."
            .venv/bin/python manage.py bootstrap_roles

            echo "==> Reiniciando Gunicorn (zero-downtime)..."
            sudo systemctl reload octobox || sudo systemctl restart octobox

            echo "==> Deploy concluído."

      - name: Health check pós-deploy
        env:
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL_VPS }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: |
          sleep 10
          curl --fail --silent --show-error "$SMOKE_BASE_URL/api/v1/health/"
          echo "Health check OK"
