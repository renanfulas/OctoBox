name: VPS Deploy (Hostgator São Paulo)

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - OctoBox CI Checks (Performance & Integrity)
    types:
      - completed

permissions:
  actions: read
  contents: read

concurrency:
  group: vps-production-main
  cancel-in-progress: false

jobs:
  verify-gates:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    steps:
      - name: Verificar todos os gates obrigatórios
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.info('Dispatch manual — pulando verificação de gates.');
              return;
            }
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.payload.workflow_run.head_sha;
            const branch = context.payload.workflow_run.head_branch;
            const required = [
              "OctoBox CI Checks (Performance & Integrity)",
              "Student Onboarding Corridors Regression",
              "Student Onboarding Real Smoke",
              "Security Scanners 🛡️",
            ];
            const sleep = ms => new Promise(r => setTimeout(r, ms));
            let missing = [...required];
            for (let i = 1; i <= 20; i++) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner, repo, branch, head_sha: headSha, per_page: 50,
              });
              missing = required.filter(name => {
                const run = data.workflow_runs.find(r => r.name === name);
                return !run || run.conclusion !== 'success';
              });
              if (!missing.length) return;
              core.info(`Aguardando (${i}/20): ${missing.join(', ')}`);
              await sleep(30000);
            }
            core.setFailed(`Gates incompletos: ${missing.join(', ')}`);

  deploy:
    needs: verify-gates
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Deploy no VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:    ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:     ${{ secrets.VPS_SSH_KEY }}
          port:    ${{ secrets.VPS_PORT }}
          timeout: 2m
          command_timeout: 20m
          script: |
            set -euo pipefail
            APP=/srv/octobox/app
            VENV=/srv/octobox/venv
            ENV=/srv/octobox/shared/octobox.env
            BACKUP="${ENV}.bak-$(date +%Y%m%d-%H%M%S)"

            echo "==> Backup do env..."
            cp "$ENV" "$BACKUP"

            echo "==> Validando env atual..."
            if ! grep -q '^DJANGO_SECRET_KEY=' "$ENV" || ! grep -q '^DATABASE_URL=' "$ENV"; then
              echo "==> Env atual parece corrompido. Procurando backup válido..."
              VALID_BACKUP="$(for file in $(ls -1t "${ENV}.bak-"* 2>/dev/null); do if grep -q '^DJANGO_SECRET_KEY=' "$file" && grep -q '^DATABASE_URL=' "$file"; then echo "$file"; break; fi; done)"
              if [ -z "${VALID_BACKUP:-}" ]; then
                echo "Nenhum backup válido encontrado para $ENV"
                exit 1
              fi
              cp "$VALID_BACKUP" "$ENV"
            fi

            echo "==> Atualizando host routing no env..."
            python3 - <<'PY'
            from pathlib import Path

            env_path = Path("/srv/octobox/shared/octobox.env")
            original = env_path.read_text(encoding="utf-8")
            updates = {
                "DJANGO_ALLOWED_HOSTS": "octoboxfit.com.br,www.octoboxfit.com.br,app.octoboxfit.com.br",
                "ALLOWED_HOSTS": "octoboxfit.com.br,www.octoboxfit.com.br,app.octoboxfit.com.br",
                "DJANGO_CSRF_TRUSTED_ORIGINS": "https://octoboxfit.com.br,https://www.octoboxfit.com.br,https://app.octoboxfit.com.br",
                "CSRF_TRUSTED_ORIGINS": "https://octoboxfit.com.br,https://www.octoboxfit.com.br,https://app.octoboxfit.com.br",
                "STUDENT_OAUTH_PUBLIC_BASE_URL": "https://app.octoboxfit.com.br",
            }

            lines = original.splitlines()
            found = set()
            output = []

            for line in lines:
                stripped = line.strip()
                if not stripped or stripped.startswith("#") or "=" not in line:
                    output.append(line)
                    continue
                key, _ = line.split("=", 1)
                key = key.strip()
                if key in updates:
                    output.append(f"{key}={updates[key]}")
                    found.add(key)
                else:
                    output.append(line)

            missing = [key for key in updates if key not in found]
            if missing:
                if output and output[-1].strip():
                    output.append("")
                output.append("# Host routing contract for www vs app")
                for key in missing:
                    output.append(f"{key}={updates[key]}")

            env_path.write_text("\n".join(output) + "\n", encoding="utf-8")
            PY

            echo "==> Host routing aplicado no env:"
            grep -E '^(DJANGO_ALLOWED_HOSTS|ALLOWED_HOSTS|DJANGO_CSRF_TRUSTED_ORIGINS|CSRF_TRUSTED_ORIGINS|STUDENT_OAUTH_PUBLIC_BASE_URL)=' "$ENV" || true

            echo "==> Pull do repositório..."
            git -C "$APP" fetch origin main
            git -C "$APP" reset --hard origin/main

            echo "==> Atualizando dependências Python..."
            "$VENV/bin/pip" install --quiet -r "$APP/requirements.txt"

            echo "==> Coletando static files..."
            set -a && source "$ENV" && set +a
            "$VENV/bin/python" "$APP/manage.py" collectstatic --noinput

            echo "==> Rodando migrations..."
            "$VENV/bin/python" "$APP/manage.py" migrate --noinput

            echo "==> Sincronizando roles..."
            "$VENV/bin/python" "$APP/manage.py" bootstrap_roles

            echo "==> Reiniciando Gunicorn..."
            systemctl restart octobox-gunicorn

            echo "==> Deploy concluído."

      - name: Health check pós-deploy
        run: |
          sleep 8
          curl --fail --silent --show-error https://app.octoboxfit.com.br/api/v1/health/
          echo " — OK"
