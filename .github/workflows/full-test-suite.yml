name: Full Test Suite

# Fase 1 do plano de qualidade de testes (docs/testing/quality-plan-prompt.md).
# Roda a suite COMPLETA em todo PR + push para main. Testes broken
# pre-existentes (Fase 0 detectou >24% falhando) sao auto-skip pelo
# conftest via tests/broken-tests.txt. Lista deve encolher a cada
# sprint conforme PRs de stabilization avancam.
#
# Paralelizacao: pytest-xdist com -n 4 (Fase 0 mediu suite single-thread
# em ~125min; -n 4 traz para 12-15min).
#
# Cobertura: XML uploaded como artifact. Comentario em PR sera adicionado
# na Fase 2 do plano.

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  full-test-suite:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    services:
      postgres:
        image: postgres:15
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements_test.txt

      - name: Run migrations
        env:
          DJANGO_SECRET_KEY: "a-dummy-secret-key-for-ci"
          PHONE_BLIND_INDEX_KEY: "ci-only-blind-index-key"
          DATABASE_URL: postgres://user:password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
        run: |
          python manage.py migrate --noinput --settings=config.settings.test

      - name: Run full suite (paralelo + skip broken)
        env:
          DJANGO_SECRET_KEY: "a-dummy-secret-key-for-ci"
          PHONE_BLIND_INDEX_KEY: "ci-only-blind-index-key"
          DJANGO_SETTINGS_MODULE: config.settings.test
          DATABASE_URL: postgres://user:password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          # Gate: skip de requires_postgres vira ERROR se banco nao for PG.
          OCTOBOX_REQUIRE_POSTGRES: "1"
        run: |
          python -m pytest \
            --create-db --migrations \
            -n 4 \
            -p no:randomly \
            --cov --cov-report=xml --cov-report=term:skip-covered \
            --tb=short \
            --ignore=test_csv_injection.py \
            --ignore=test_whale.py \
            --continue-on-collection-errors \
            --junitxml=junit-report.xml \
            -q

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 70
          ANNOTATE_MISSING_LINES: true
          ANNOTATION_TYPE: warning

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-report
          path: junit-report.xml

  # ---------------------------------------------------------------------------
  # Job: tenant boundary tests (B1-B12)
  # Roda separado do full-suite porque precisa de schemas box_test_a e
  # box_test_b provisionados. O full-suite so provisiona box_test (slug=test).
  # ---------------------------------------------------------------------------
  tenant-boundary:
    runs-on: ubuntu-latest
    needs: full-test-suite

    services:
      postgres:
        image: postgres:15
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements_test.txt

      - name: Provision schemas box_test_a e box_test_b
        env:
          DJANGO_SECRET_KEY: "a-dummy-secret-key-for-ci"
          PHONE_BLIND_INDEX_KEY: "ci-only-blind-index-key"
          DJANGO_SETTINGS_MODULE: config.settings.test
          DATABASE_URL: postgres://user:password@localhost:5432/test_db
        run: |
          python manage.py migrate --noinput
          bash scripts/provision_test_tenants.sh

      - name: Run tenant boundary tests (B1-B12)
        env:
          DJANGO_SECRET_KEY: "a-dummy-secret-key-for-ci"
          PHONE_BLIND_INDEX_KEY: "ci-only-blind-index-key"
          DJANGO_SETTINGS_MODULE: config.settings.test
          DATABASE_URL: postgres://user:password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          OCTOBOX_REQUIRE_POSTGRES: "1"
        run: |
          python -m pytest tests/test_tenant_boundary.py \
            --create-db --migrations \
            -m "tenant or isolation or requires_postgres" \
            --tb=short \
            --junitxml=junit-boundary.xml \
            -v

      - name: Upload boundary JUnit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-boundary
          path: junit-boundary.xml

  order-dependence-check:
    # Fase 3: valida que a suite passa em ordem aleatoria com seeds fixos.
    # Validado em 2026-05-21: 891/891 verde nos 3 seeds (0 order-dependentes).
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        seed: [42, 137, 9999]

    services:
      postgres:
        image: postgres:15
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements_test.txt

      - name: Run suite with seed=${{ matrix.seed }}
        env:
          DJANGO_SECRET_KEY: "a-dummy-secret-key-for-ci"
          PHONE_BLIND_INDEX_KEY: "ci-only-blind-index-key"
          DJANGO_SETTINGS_MODULE: config.settings.test
          DATABASE_URL: postgres://user:password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
        run: |
          python -m pytest \
            --create-db --migrations \
            -n 4 \
            --randomly-seed=${{ matrix.seed }} \
            --ignore=test_csv_injection.py \
            --ignore=test_whale.py \
            --continue-on-collection-errors \
            --junitxml=junit-seed-${{ matrix.seed }}.xml \
            --tb=short \
            -q

      - name: Upload JUnit (seed=${{ matrix.seed }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-seed-${{ matrix.seed }}
          path: junit-seed-${{ matrix.seed }}.xml
