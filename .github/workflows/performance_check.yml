# .github/workflows/ci_checks.yml

name: OctoBox CI Checks (Performance & Integrity)

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  front-runtime-drift:
    name: Front / Runtime Drift Audit
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v6

    - name: 2. Set up Python Environment
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: 3. Install Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt

    - name: 4. Explain Audit Goal
      run: |
        echo "Auditando drift entre static/ e staticfiles/."
        echo "Se houver divergencia, a UI pode servir assets visuais antigos mesmo com CSS novo no repositorio."

    - name: 5. Sync Runtime Assets Mirror
      env:
        DJANGO_SECRET_KEY: 'a-dummy-secret-key-for-ci'
        PHONE_BLIND_INDEX_KEY: 'ci-only-blind-index-key'
      run: |
        python manage.py sync_runtime_assets --collectstatic --settings=config.settings.test

    - name: 6. Generate Pedagogical Drift Report
      env:
        DJANGO_SECRET_KEY: 'a-dummy-secret-key-for-ci'
        PHONE_BLIND_INDEX_KEY: 'ci-only-blind-index-key'
      run: |
        python manage.py check_static_drift --limit 20 --settings=config.settings.test | tee static-drift-report.txt
        {
          echo "## Front / Runtime Drift Audit"
          echo ""
          echo "Este job verifica se \`static/\` e \`staticfiles/\` estao sincronizados."
          echo ""
          echo "Quando existe drift, o runtime pode vestir uma versao antiga do frontend."
          echo ""
          echo "### Saida da auditoria"
          echo '```text'
          cat static-drift-report.txt
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: 7. Upload Drift Report Artifact
      uses: actions/upload-artifact@v7
      with:
        name: static-drift-report
        path: static-drift-report.txt

    - name: 8. Enforce Zero Drift
      env:
        DJANGO_SECRET_KEY: 'a-dummy-secret-key-for-ci'
        PHONE_BLIND_INDEX_KEY: 'ci-only-blind-index-key'
      run: |
        python manage.py check_static_drift --strict --settings=config.settings.test

  test:
    needs: front-runtime-drift
    runs-on: ubuntu-latest
    
    # Define os serviços de dependência (banco de dados e cache)
    services:
      postgres:
        image: postgres:15
        # Opções de saúde para garantir que o postgres esteja pronto antes dos testes
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
      redis:
        image: redis:6
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v6

    - name: 2. Set up Python Environment
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: 3. Install Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
        python -m pip install pytest pytest-django pytest-benchmark
        python -m pip show djangorestframework

    - name: 3.5 Run Migrations
      run: |
        python manage.py migrate --noinput --settings=config.settings.test
      env:
        DJANGO_SECRET_KEY: 'a-dummy-secret-key-for-ci'
        PHONE_BLIND_INDEX_KEY: 'ci-only-blind-index-key'
        DATABASE_URL: postgres://user:password@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379

    - name: 4. Populate Test Database for CI
      run: |
        python manage.py populate_test_db --scale=load --settings=config.settings.test
      env:
        DJANGO_SECRET_KEY: 'a-dummy-secret-key-for-ci'
        PHONE_BLIND_INDEX_KEY: 'ci-only-blind-index-key'
        DATABASE_URL: postgres://user:password@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379

    - name: 5. Run Integrity & Performance Tests (SIE & DPA)
      run: |
        python -m pytest tests/test_performance.py -q
      env:
        DJANGO_SECRET_KEY: 'a-dummy-secret-key-for-ci'
        PHONE_BLIND_INDEX_KEY: 'ci-only-blind-index-key'
        DATABASE_URL: postgres://user:password@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379
