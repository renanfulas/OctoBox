name: Student Onboarding Real Smoke

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  onboarding-real-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-django

      - name: Run real onboarding smoke
        env:
          DJANGO_SECRET_KEY: "a-dummy-secret-key-for-ci"
          PHONE_BLIND_INDEX_KEY: "ci-only-blind-index-key"
          DJANGO_SETTINGS_MODULE: config.settings.test
        run: |
          python scripts/run_student_onboarding_real_smoke.py
