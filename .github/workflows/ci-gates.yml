name: CI Gates

# Gates de producao independentes do full-test-suite.
# Cada job aqui falha o PR rapidamente por motivos especificos.
#
# Jobs:
#   migration-check  — detecta migration nao-commitada
#   markers-lint     — garante que todos os markers usados estao registrados
#
# Roda em todo PR e push para main.
# Tempo alvo: < 60s total (sem banco de dados).

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Detecta se ha alguma migration nao-commitada.
  # Pega 90% dos "esqueci de rodar makemigrations" antes do deploy.
  # ---------------------------------------------------------------------------
  migration-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      postgres:
        image: postgres:15
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check for missing migrations
        env:
          DJANGO_SECRET_KEY: "a-dummy-secret-key-for-ci"
          PHONE_BLIND_INDEX_KEY: "ci-only-blind-index-key"
          DJANGO_SETTINGS_MODULE: config.settings.test
          DATABASE_URL: postgres://user:password@localhost:5432/test_db
        run: |
          python manage.py makemigrations --check --dry-run --no-input
          echo "✅ Nenhuma migration pendente."

  # ---------------------------------------------------------------------------
  # Valida que markers usados em @tag() e @pytest.mark.X estao registrados
  # no pytest.ini. Sem isso viram PytestUnknownMarkWarning silencioso.
  # ---------------------------------------------------------------------------
  markers-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pytest only
        run: python -m pip install pytest

      - name: Check for unknown markers
        run: |
          # Coleta sem rodar — qualquer PytestUnknownMarkWarning vira saida
          # e o grep falha o job se encontrar.
          python -m pytest --collect-only -q \
            --ignore=test_csv_injection.py \
            --ignore=test_whale.py \
            --ignore=tests/e2e \
            2>&1 | tee /tmp/collect-output.txt

          if grep -q "PytestUnknownMarkWarning" /tmp/collect-output.txt; then
            echo ""
            echo "❌ Markers nao registrados encontrados:"
            grep "PytestUnknownMarkWarning" /tmp/collect-output.txt
            echo ""
            echo "Adicione os markers em pytest.ini na secao [markers]."
            exit 1
          fi
          echo "✅ Todos os markers estao registrados."
