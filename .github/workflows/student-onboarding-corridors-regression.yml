name: Student Onboarding Corridors Regression

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  onboarding-corridors:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements_test.txt

      - name: Run migrations
        env:
          DJANGO_SECRET_KEY: "a-dummy-secret-key-for-ci"
          PHONE_BLIND_INDEX_KEY: "ci-only-blind-index-key"
          DATABASE_URL: postgres://user:password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
        run: |
          python manage.py migrate --noinput --settings=config.settings.test

      - name: Run explicit onboarding corridors regression
        env:
          DJANGO_SECRET_KEY: "a-dummy-secret-key-for-ci"
          PHONE_BLIND_INDEX_KEY: "ci-only-blind-index-key"
          DJANGO_SETTINGS_MODULE: config.settings.test
          DATABASE_URL: postgres://user:password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
        run: |
          python scripts/run_student_onboarding_corridors_regression.py
