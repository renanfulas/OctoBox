name: Security Scanners 🛡️

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    - cron: '0 0 * * 1' # Weekly scan

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install bandit pip-audit safety
          
      - name: Run Bandit (Static Analysis)
        run: bandit -r . -x ./.venv,./tests,./*migrations* -ll
        
      - name: Run Pip-Audit (Dependency Scan)
        run: pip-audit
        
      - name: Run Safety (Vulnerability Database)
        run: safety check
      - name: Gitleaks Scan (Secret Detection)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true # Warning mode first
