name: Security Scanners 🛡️

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    - cron: '0 0 * * 1'

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade "pip<26"
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install bandit pip-audit safety

      - name: Explain Security Gate
        run: |
          echo "Este workflow e o gate unico de seguranca antes do deploy."
          echo "Bandit cobre codigo, pip-audit e Safety cobrem dependencias e Gitleaks cobre segredos."

      - name: Run Bandit (Static Analysis)
        run: >
          bandit -r access api auditing boxcore catalog communications config
          dashboard finance guide integrations jobs model_support monitoring
          onboarding operations reporting scripts security shared_support
          students -x ./.venv,./tests,./*migrations* -ll

      - name: Run Pip-Audit (Dependency Scan)
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt
          else
            echo "requirements.txt nao encontrado; pulando pip-audit."
          fi

      - name: Run Safety Scan (Vulnerability Database)
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        run: |
          if [ -z "${SAFETY_API_KEY}" ]; then
            echo "SAFETY_API_KEY nao configurada; pulando Safety Scan moderno."
            echo "Configure o secret SAFETY_API_KEY para habilitar o comando safety scan no CI."
            exit 0
          fi
          safety --stage cicd --key "${SAFETY_API_KEY}" scan --target . --output screen

      - name: Install Gitleaks CLI
        env:
          GITLEAKS_VERSION: 8.24.3
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x ./gitleaks

      - name: Gitleaks Scan (Secret Detection)
        run: |
          ./gitleaks detect \
            --redact \
            --verbose \
            --exit-code=2 \
            --report-format=sarif \
            --report-path=gitleaks-results.sarif \
            --config=.gitleaks.toml \
            --log-opts=-1

      - name: Upload Gitleaks Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-results
          path: gitleaks-results.sarif
