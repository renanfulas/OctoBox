name: Fetch VPS Logs (ops one-off)

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  fetch-logs:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Fetch gunicorn error logs from VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 2m
          command_timeout: 5m
          script: |
            echo "=== TRACEBACKS PYTHON ==="
            journalctl -u octobox-gunicorn --no-pager -a 2>/dev/null \
              | grep -A 50 "Traceback (most recent call last)" \
              | tail -500 || echo "(nenhum traceback encontrado)"

            echo ""
            echo "=== STDERR WORKER SEM ACCESS LOG ==="
            journalctl -u octobox-gunicorn -n 500 --no-pager -o cat 2>/dev/null \
              | grep -v '"[A-Z]* .* HTTP/1\.' \
              | grep -v "^$" \
              | tail -300 || true
