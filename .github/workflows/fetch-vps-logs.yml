name: Fetch VPS Logs (ops one-off)

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  fetch-logs:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Inspecionar Postgres via psql direto
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 2m
          command_timeout: 5m
          script: |
            ENV=/srv/octobox/shared/octobox.env
            set -a && source "$ENV" && set +a
            DB="$DATABASE_URL"
            echo "=== SCHEMAS NO POSTGRES ==="
            psql "$DB" -t -A -c "SELECT schema_name FROM information_schema.schemata WHERE schema_name NOT IN ('pg_catalog','information_schema','pg_toast') AND schema_name NOT LIKE 'pg_temp%' AND schema_name NOT LIKE 'pg_toast_temp%' ORDER BY schema_name"
            echo ""
            echo "=== control_box (Box records) ==="
            psql "$DB" -c "SELECT id, slug, schema_name, status, display_name, created_at FROM control_box ORDER BY id" 2>&1 || echo "ERRO ao consultar control_box"
            echo ""
            echo "=== SCHEMAS box_* E CONTAGEM DE TABELAS ==="
            psql "$DB" -t -A -c "SELECT table_schema, COUNT(*) FROM information_schema.tables WHERE table_schema LIKE 'box_%' AND table_type='BASE TABLE' GROUP BY table_schema ORDER BY table_schema"
            echo ""
            echo "=== DJANGO_MIGRATIONS (control, student_identity, boxcore, auditing) ==="
            psql "$DB" -t -A -c "SELECT app || '  ' || name || '  ' || applied::text FROM django_migrations WHERE app IN ('control','student_identity','students','boxcore','auditing') ORDER BY app, applied"
            echo ""
            echo "=== STUDENT_IDENTITY contagem por box_root_slug ==="
            psql "$DB" -t -A -c "SELECT COALESCE(box_root_slug,'(null)') || ': ' || COUNT(*) FROM student_identity_studentidentity GROUP BY box_root_slug ORDER BY COUNT(*) DESC LIMIT 10" 2>&1 || echo "ERRO"
            echo ""
            echo "=== boxcore_* NO SCHEMA PUBLIC ==="
            psql "$DB" -t -A -c "SELECT 'public.' || table_name FROM information_schema.tables WHERE table_schema='public' AND table_name LIKE 'boxcore_%' ORDER BY table_name" 2>&1 || echo "Nenhuma"
            echo ""
            echo "=== VERSAO POSTGRES ==="
            psql "$DB" -t -A -c "SELECT version()"
