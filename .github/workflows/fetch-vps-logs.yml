import os, sys, traceback
sys.path.insert(0, '/srv/octobox/app')
os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'octobox.settings')
import django
django.setup()
try:
    from student_identity.models import StudentIdentity
    result = StudentIdentity.objects.filter(provider_subject='test_probe_nonexistent').first()
    print(f"Query OK — result={result}")
except Exception:
    traceback.print_exc()
