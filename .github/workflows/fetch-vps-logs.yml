name: Fetch VPS Logs (ops one-off)

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  fetch-logs:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Fetch gunicorn error logs from VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 2m
          command_timeout: 5m
          script: |
            echo "=== JANELA OAUTH 500 (13:34-13:38 BRT = 16:34-16:38 UTC) ==="
            journalctl -u octobox-gunicorn \
              --since "2026-05-22 16:34:00" \
              --until "2026-05-22 16:38:00" \
              --no-pager -o cat 2>/dev/null || echo "(sem logs nessa janela UTC)"

            echo ""
            echo "=== JANELA OAUTH 500 (13:34-13:38 BRT = sem offset) ==="
            journalctl -u octobox-gunicorn \
              --since "2026-05-22 13:34:00" \
              --until "2026-05-22 13:38:00" \
              --no-pager -o cat 2>/dev/null || echo "(sem logs nessa janela local)"

            echo ""
            echo "=== TIMEZONE DO SERVIDOR ==="
            timedatectl show --no-pager 2>/dev/null || date

            echo ""
            echo "=== TRACEBACKS RECENTES (ultimos 2000 linhas) ==="
            journalctl -u octobox-gunicorn -n 2000 --no-pager -o cat 2>/dev/null \
              | grep -A 40 "Traceback (most recent call last)" \
              | tail -600 || echo "(nenhum traceback)"
