name: Fetch VPS Logs (ops one-off)

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  fetch-logs:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Fetch gunicorn error logs from VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 2m
          command_timeout: 5m
          script: |
            APP=/srv/octobox/app
            VENV=/srv/octobox/venv
            ENV=/srv/octobox/shared/octobox.env

            echo "=== DJANGO LOG FILES ==="
            find /srv/octobox /var/log -name "*.log" 2>/dev/null | head -20
            ls -lh /srv/octobox/app/*.log /srv/octobox/logs/ 2>/dev/null || echo "(nenhum arquivo .log direto)"

            echo ""
            echo "=== LOGGING CONFIG NO SETTINGS ==="
            set -a && source "$ENV" && set +a
            "$VENV/bin/python" - <<'PY'
import os, sys
sys.path.insert(0, '/srv/octobox/app')
os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'octobox.settings')
import django
django.setup()
from django.conf import settings
import json
logging_cfg = getattr(settings, 'LOGGING', {})
print(json.dumps(logging_cfg, indent=2, default=str))
PY

            echo ""
            echo "=== REPRODUZIR TRACEBACK: simular OAuth callback com bad state ==="
            set -a && source "$ENV" && set +a
            "$VENV/bin/python" - <<'PY'
import os, sys, traceback
sys.path.insert(0, '/srv/octobox/app')
os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'octobox.settings')
import django
django.setup()

from django.test import RequestFactory
from student_identity.views import StudentOAuthCallbackView

factory = RequestFactory()
request = factory.get('/aluno/auth/oauth/google/callback/', {
    'state': 'eyJwcm92aWRlciI6Imdvb2dsZSIsImludml0ZV90b2tlbiI6IiJ9:1wQSqx:bzBvKZ3ep12izc-XvrKqNL2Kt-nLdyP74VXpfva72aw',
    'code': 'DUMMY_CODE_WILL_FAIL_EARLY',
    'iss': 'https://accounts.google.com',
    'scope': 'email profile openid',
})
request.META['HTTP_HOST'] = 'app.octoboxfit.com.br'
request.META['SERVER_NAME'] = 'app.octoboxfit.com.br'
request.META['SERVER_PORT'] = '443'
request.META['wsgi.url_scheme'] = 'https'

try:
    view = StudentOAuthCallbackView.as_view()
    response = view(request, provider='google')
    print(f"Response status: {response.status_code}")
except Exception as e:
    traceback.print_exc()
PY
