name: Fetch VPS Logs (ops one-off)

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  fetch-logs:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Fetch gunicorn error logs from VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 2m
          command_timeout: 5m
          script: |
            APP=/srv/octobox/app
            VENV=/srv/octobox/venv
            ENV=/srv/octobox/shared/octobox.env
            set -a && source "$ENV" && set +a

            echo "=== COLUNAS REAIS: student_identity_studentidentity ==="
            "$VENV/bin/python" - <<'PY'
import os, sys
sys.path.insert(0, '/srv/octobox/app')
os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'octobox.settings')
import django
django.setup()
from django.db import connection
with connection.cursor() as cur:
    cur.execute("""
        SELECT column_name, data_type, is_nullable
        FROM information_schema.columns
        WHERE table_schema = 'public'
          AND table_name = 'student_identity_studentidentity'
        ORDER BY ordinal_position
    """)
    for row in cur.fetchall():
        print(row)
PY

