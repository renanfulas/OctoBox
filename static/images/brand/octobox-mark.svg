  <path d="M128 70 178 98l-50 29-50-29 50-28Z" fill="url(#octobox-core)" fill-opacity="0.92"/>
  <path d="M78 98v60l50 28v-59L78 98Z" fill="#00E5FF" fill-opacity="0.18"/>
  <path d="M178 98v60l-50 28v-59l50-29Z" fill="#4A90E2" fill-opacity="0.34"/>
  <path d="M128 70v57m-50-29 50 29 50-29m-50 29v59" fill="none" stroke="#EAFBFF" stroke-opacity="0.58" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M156 85 178 98v60l-22 13V85Z" fill="url(#octobox-accent)" fill-opacity="0.28"/>
  <circle cx="128" cy="128" r="6" fill="#EAFBFF"/>
