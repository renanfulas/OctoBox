  <text x="214" y="130" fill="#91A4C4" font-family="Manrope, Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="4">CONTROL SYSTEM</text>
  <path d="M214 148h240" stroke="#00E5FF" stroke-opacity="0.42" stroke-width="2" stroke-linecap="round"/>
  <path d="M474 148h86" stroke="#FF00C8" stroke-opacity="0.45" stroke-width="2" stroke-linecap="round"/>
