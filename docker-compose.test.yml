version: '3.8'

services:
  db_test:
    image: postgres:15-alpine
    container_name: octobox_db_test
    environment:
      - POSTGRES_DB=octobox_test
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_test:/var/lib/postgresql/data

  redis_test:
    image: redis:7-alpine
    container_name: octobox_redis_test
    ports:
      - "6380:6379"

volumes:
  postgres_data_test:
