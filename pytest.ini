[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = tests.py test_*.py *_tests.py
# test_csv_injection.py e test_whale.py sao scripts ad-hoc Django (chamam
# django.setup() no top-level e executam codigo em import), nao testes pytest.
# Sem --ignore, pytest tenta coletar e falha com "Database access not allowed"
# antes da suite comecar. Mover para scripts/ seria a solucao definitiva.
addopts = --reuse-db --nomigrations --benchmark-autosave --benchmark-max-time=0.2 --ignore=test_csv_injection.py --ignore=test_whale.py --ignore=tests/e2e -ra
# tests/e2e/ e ignorado por padrao: testes E2E sao lentos (10-30s cada),
# precisam de browser instalado e rodam apenas no workflow e2e-nightly.yml.
# Para rodar localmente: docker compose -f docker-compose.postgres.yml up -d
#                       pytest tests/e2e/ --create-db --migrations
# Para rodar em CI:      ver .github/workflows/e2e-nightly.yml

# Marcadores de teste
# Registrar aqui elimina PytestUnknownMarkWarning e permite filtrar via -m.
markers =
    e2e: teste end-to-end com browser real (lento; roda so em main/nightly)
    tenant: envolve criacao ou navegacao de tenants Django
    isolation: valida isolamento de dados entre tenants (B1-B12)
    requires_postgres: exige PostgreSQL + django-tenants; skip apenas no escape SQLite legado
    slow: roda em >1s por design (benchmarks, migrations, etc.)
    flaky: conhecido como instavel — exige ticket vinculado (nao usar sem reason=)
    public_schema: classe roda no schema public (opt-out do schema_context autouse); para testes que criam/manipulam tenants (provision_box, archive_box)

# Limpeza de avisos
filterwarnings =
    ignore::DeprecationWarning
