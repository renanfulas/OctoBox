[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = tests.py test_*.py *_tests.py
# test_csv_injection.py e test_whale.py sao scripts ad-hoc Django (chamam
# django.setup() no top-level e executam codigo em import), nao testes pytest.
# Sem --ignore, pytest tenta coletar e falha com "Database access not allowed"
# antes da suite comecar. Mover para scripts/ seria a solucao definitiva.
addopts = --reuse-db --nomigrations --benchmark-autosave --benchmark-max-time=0.2 --ignore=test_csv_injection.py --ignore=test_whale.py --ignore=tests/e2e
# tests/e2e/ e ignorado por padrao: testes E2E sao lentos (10-30s cada),
# precisam de browser instalado e rodam apenas no workflow e2e-nightly.yml.
# Para rodar localmente: pytest tests/e2e/ --create-db --migrations
# Para rodar em CI:      ver .github/workflows/e2e-nightly.yml

# Marcadores de teste
markers =
    e2e: teste end-to-end com browser real (lento; roda so em main/nightly)

# Limpeza de avisos
filterwarnings =
    ignore::DeprecationWarning
