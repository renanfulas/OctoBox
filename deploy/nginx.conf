# deploy/nginx.conf — Nginx para o OctoBox no VPS.
# Após certbot: ele sobrescreve os blocos SSL automaticamente.

server {
    listen 80;
    server_name octoboxfit.com.br www.octoboxfit.com.br;

    # Certbot gerencia o redirect para HTTPS após o primeiro run
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name octoboxfit.com.br www.octoboxfit.com.br;

    # Certbot preenche esses caminhos automaticamente
    ssl_certificate     /etc/letsencrypt/live/octoboxfit.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/octoboxfit.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # Static files servidos pelo Nginx (muito mais rápido que WhiteNoise)
    location /static/ {
        alias /srv/octobox/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /srv/octobox/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Tudo o mais vai para o Gunicorn via Unix socket
    location / {
        proxy_pass          http://unix:/run/octobox/gunicorn.sock;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # Segurança
    add_header X-Frame-Options         "DENY"                          always;
    add_header X-Content-Type-Options  "nosniff"                       always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
}
